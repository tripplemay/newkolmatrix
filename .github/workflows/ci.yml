name: CI

# CICD-VPS F003 — push/PR 到 main 自动跑 lint + typecheck + build + visual。
# 状态机 / 文档 / 记忆类改动不触发（paths-ignore）。
on:
  push:
    branches: [main]
    paths-ignore:
      - ".auto-memory/**"
      - "progress.json"
      - "features.json"
      - "backlog.json"
      - "docs/**"
      - "design-draft/**"
      - "framework/**"
      - "**/*.md"
      - "harness-rules.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # M1-A-BRIEF F001 — 单测门，与 lint / typecheck 同级。
  # 跑 --coverage：覆盖率阈值（src/lib/domain/** + data/provenance.ts 行覆盖 ≥80%）
  # 在此真正执行，不是只写在配置里的摆设。
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Visual regression (dashboard vs linux baseline)
        run: npm run test:visual
