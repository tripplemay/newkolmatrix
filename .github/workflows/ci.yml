name: CI

# CICD-VPS F003 — push/PR 到 main 自动跑 lint + typecheck + build + visual。
# 状态机 / 文档 / 记忆类改动不触发（paths-ignore）。
on:
  push:
    branches: [main]
    paths-ignore:
      - ".auto-memory/**"
      - "progress.json"
      - "features.json"
      - "backlog.json"
      - "docs/**"
      - "design-draft/**"
      - "framework/**"
      - "**/*.md"
      - "harness-rules.md"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # M1-A-BRIEF F001 + F006 — 单测 / 集成测试门，与 lint / typecheck 同级。
  #
  # 跑 --coverage：覆盖率阈值（src/lib/domain/** + data/provenance.ts 行覆盖 ≥80%）
  # 在此真正执行，不是只写在配置里的摆设。
  #
  # 起 Postgres service 的理由（F006）：tests/integration/** 打真库验事务语义与
  # 「守卫拒绝零写入」。若 CI 无库而让这些用例静默跳过，它们就永远是绿的——
  # 那正是本项目反复要避免的假绿。宁可多起一个 service，也不要一道跳过即通过的门。
  # 镜像用 pgvector/pgvector:pg16：init migration 里有 CREATE EXTENSION vector。
  unit:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolmatrix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kolmatrix?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Apply migrations
        run: npx prisma migrate deploy
      - run: npm run test:unit:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # M1-B-BRIEF F001（D7）— 起 Postgres service 的理由：详情页 RSC 直连 DB，
  # 无法用 playwright route-mock 隔离。CI 无库时详情页渲染错误态，视觉套件硬红
  #（不是漂移是翻红，同 BL-FE-11 盲区的反面）。这是 RSC 直读的既定代价，
  # 做法同 unit job：pgvector service + migrate deploy + seed:projects
  #（seed 自建 dev tenant，不依赖 seed:kol / 网关凭据——视觉门不引外部抖动）。
  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolmatrix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kolmatrix?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Seed canonical projects
        run: npx tsx scripts/seed/canonical-projects.ts
      # M2-B F004【P6】：创作者库/抽屉基线确定性夹具（2 行固定 publicId Kol，双状态）
      - name: Seed visual kol fixtures
        run: npx tsx scripts/seed/visual-kols.ts
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Visual regression (dashboard vs linux baseline)
        run: npm run test:visual
