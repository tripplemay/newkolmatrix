name: Update visual baselines

# CICD-VPS F004 — 手动在 CI(linux) 重生视觉 baseline 并 commit。
# 因 mac↔linux 字体渲染不 pixel-match，CI 的视觉回归须用 linux 生成的 baseline。
# 首次配置 或 dashboard 视觉有意变更后，跑此 workflow 更新 -linux baseline。
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-visual-baselines
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    # M1-B-BRIEF F001（D7）— 与 ci.yml visual job 同构起 DB：详情页 RSC 直连库，
    # 重生环境若无 DB，错误态会被固化进基线（web-runtime-patterns §4.3 的静默坑——
    # 基线永远绿，因为两边都是错误页）。重生环境必须与断言环境同构。
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kolmatrix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kolmatrix?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Seed canonical projects
        run: npx tsx scripts/seed/canonical-projects.ts
      # M2-B F004【P6】：与 ci.yml visual job 同一夹具（基线重生与断言同态）
      - name: Seed visual kol fixtures
        run: npx tsx scripts/seed/visual-kols.ts
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Regenerate baselines (linux)
        run: npm run test:visual:update
      - name: Commit updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/screenshots/baseline
          if git diff --cached --quiet; then
            echo "no baseline changes"
          else
            git commit -m "chore(visual): update linux baselines [skip ci]"
            git push
          fi
