# CICD-VPS F007 — newkol.guangai.ai nginx 反代（newkolmatrix 重构版验收环境）
# 部署到 deploysvr: /etc/nginx/sites-available/newkol.guangai.ai.conf → 软链 sites-enabled/
# 反代 127.0.0.1:3300（docker 容器 newkolmatrix-app）。与旧 kol.guangai.ai(:3001) 独立。
# 证书由 certbot 签发（见 docs/dev/deploy.md）。

upstream newkolmatrix_backend {
    server 127.0.0.1:3300;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name newkol.guangai.ai;

    # certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余 80 → 443
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name newkol.guangai.ai;

    ssl_certificate     /etc/letsencrypt/live/newkol.guangai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newkol.guangai.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Next.js 静态资源 长缓存
    location /_next/static/ {
        proxy_pass http://newkolmatrix_backend;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://newkolmatrix_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
