# CICD-VPS F002 — newkolmatrix 生产 compose（deploysvr /opt/apps/newkolmatrix）
# 镜像由 build-push.yml 预构建推 ghcr；本机只 pull 不 build。前端-only，无 DB/redis。
# 宿主 127.0.0.1:3300 → 容器 :3000，nginx 反代 newkol.guangai.ai → 3300。与旧 kolmatrix(:3001) 隔离。
services:
  app:
    image: ghcr.io/tripplemay/newkolmatrix:${IMAGE_TAG:-latest}
    container_name: newkolmatrix-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3300:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://127.0.0.1:3000/admin/dashboards/default',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
