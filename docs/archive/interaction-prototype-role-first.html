<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KOLMatrix Role-first Workbench</title>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #f8fafb;
      --surface-3: #eef2f5;
      --ink: #18212b;
      --ink-2: #344054;
      --muted: #667085;
      --soft: #98a2b3;
      --line: #e1e6eb;
      --line-strong: #cbd3dc;
      --accent: #2563eb;
      --accent-soft: #eaf1ff;
      --accent-ink: #1746a2;
      --teal: #0f8b7d;
      --teal-soft: #e7f6f3;
      --amber: #b86109;
      --amber-soft: #fff3df;
      --red: #b83d4a;
      --red-soft: #fff0f1;
      --green: #18794e;
      --green-soft: #eaf7f0;
      --shadow: 0 16px 48px rgba(22, 31, 44, .12);
      --sidebar-w: 224px;
      --assistant-w: 336px;
      --topbar-h: 58px;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
    body[data-role="bd"] { --accent: #0f8b7d; --accent-soft: #e7f6f3; --accent-ink: #0a6259; }
    body[data-role="ops"] { --accent: #b86109; --accent-soft: #fff3df; --accent-ink: #7a3e06; }
    button, input, textarea, select { font: inherit; letter-spacing: 0; }
    button, a { -webkit-tap-highlight-color: transparent; }
    button { border: 0; }
    a { color: inherit; text-decoration: none; }
    .icon { width: 17px; height: 17px; stroke-width: 1.9; flex: 0 0 auto; }
    .icon.sm { width: 14px; height: 14px; }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr) var(--assistant-w);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #17202a;
      color: #e9eef4;
      border-right: 1px solid #25313e;
      z-index: 30;
    }
    .brand {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      border-bottom: 1px solid #2a3542;
      font-weight: 760;
      font-size: 14px;
    }
    .brand-mark {
      width: 29px;
      height: 29px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #17202a;
      font-size: 11px;
      font-weight: 850;
    }
    .org {
      margin: 14px 12px 8px;
      padding: 10px;
      border: 1px solid #344150;
      border-radius: 6px;
      background: #202b37;
    }
    .org small { display: block; color: #93a2b3; font-size: 10px; margin-bottom: 4px; }
    .org b { display: flex; align-items: center; gap: 7px; font-size: 12px; }
    .nav-label {
      margin: 13px 18px 6px;
      color: #718094;
      font-size: 10px;
      font-weight: 750;
      text-transform: uppercase;
    }
    .nav { display: grid; gap: 3px; padding: 0 9px; }
    .nav-btn {
      width: 100%;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      color: #b8c3cf;
      background: transparent;
      border-radius: 5px;
      cursor: pointer;
      text-align: left;
      font-size: 12px;
      font-weight: 620;
    }
    .nav-btn:hover { background: #222e3b; color: #fff; }
    .nav-btn.on { background: #f8fafc; color: #17202a; }
    .nav-count {
      margin-left: auto;
      min-width: 20px;
      padding: 2px 6px;
      border-radius: 10px;
      background: #354353;
      color: #dae2eb;
      font-size: 10px;
      text-align: center;
    }
    .nav-btn.on .nav-count { background: var(--accent-soft); color: var(--accent-ink); }
    .sidebar-project {
      margin: 14px 9px 0;
      padding: 11px;
      border-top: 1px solid #2d3946;
      color: #bac5d0;
      font-size: 11px;
      line-height: 1.45;
    }
    .sidebar-project b { display: block; color: #fff; margin: 4px 0; font-size: 12px; }
    .sidebar-project .progress { margin-top: 8px; height: 3px; background: #354353; }
    .sidebar-project .progress i { display: block; width: 58%; height: 100%; background: #56c2a8; }
    .sidebar-foot {
      margin-top: auto;
      padding: 13px 14px;
      border-top: 1px solid #2a3542;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--accent);
      font-size: 11px;
      font-weight: 800;
      flex: 0 0 auto;
    }
    .sidebar-foot b { display: block; font-size: 11px; }
    .sidebar-foot small { color: #7f8fa2; font-size: 10px; }

    .main { min-width: 0; }
    .topbar {
      position: sticky;
      top: 0;
      height: var(--topbar-h);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 22px;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .crumb { min-width: 0; font-size: 12px; color: var(--muted); }
    .crumb b { color: var(--ink); }
    .top-spacer { flex: 1; }
    .role-switch {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      width: 328px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-2);
    }
    .role-btn {
      min-height: 31px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 7px;
      border-radius: 4px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 10.5px;
      font-weight: 680;
      white-space: nowrap;
    }
    .role-btn.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 4px rgba(17, 24, 39, .1); }
    .icon-btn {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--ink-2);
      background: var(--surface);
      cursor: pointer;
    }
    .icon-btn:hover { border-color: var(--line-strong); background: var(--surface-2); }
    .mobile-only { display: none; }

    .view { padding: 24px clamp(18px, 3vw, 38px) 56px; max-width: 1320px; margin: 0 auto; }
    .page-head {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }
    .page-head h1 { margin: 0 0 6px; font-size: 23px; line-height: 1.2; letter-spacing: 0; }
    .page-head p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .page-actions { margin-left: auto; display: flex; gap: 8px; }
    .btn {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 12px;
      border-radius: 5px;
      border: 1px solid var(--line-strong);
      background: var(--surface);
      color: var(--ink-2);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { background: var(--surface-2); }
    .btn.primary { color: #fff; background: var(--accent); border-color: var(--accent); }
    .btn.primary:hover { filter: brightness(.95); }
    .btn.danger { color: var(--red); background: var(--red-soft); border-color: #f1c8cd; }
    .btn:disabled { opacity: .48; cursor: not-allowed; }
    .btn.sm { min-height: 29px; padding: 0 9px; font-size: 10.5px; }

    .role-charter {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(220px, .65fr);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      background: var(--surface);
      margin-bottom: 22px;
    }
    .charter-main { padding: 15px 17px; }
    .charter-eyebrow { color: var(--accent-ink); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
    .charter-main strong { font-size: 14px; }
    .charter-main p { margin: 5px 0 0; color: var(--muted); font-size: 11px; line-height: 1.5; }
    .charter-boundary {
      padding: 14px 17px;
      border-left: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--ink-2);
      font-size: 10.5px;
      line-height: 1.55;
    }
    .charter-boundary b { display: block; color: var(--red); margin-bottom: 3px; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(280px, .85fr);
      gap: 24px;
      align-items: start;
    }
    .section { min-width: 0; }
    .section + .section { margin-top: 24px; }
    .section-head {
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }
    .section-head h2 { margin: 0; font-size: 13px; }
    .section-head .meta { color: var(--muted); font-size: 10.5px; }
    .section-head .grow { flex: 1; }

    .task-list { border-top: 1px solid var(--line); }
    .task-row {
      width: 100%;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 13px 3px;
      border-bottom: 1px solid var(--line);
      background: transparent;
      text-align: left;
      cursor: pointer;
    }
    .task-row:hover { background: #fafbfc; }
    .task-ico {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: var(--accent-ink);
      background: var(--accent-soft);
    }
    .task-row strong { display: block; margin-bottom: 4px; font-size: 12px; }
    .task-row p { margin: 0; color: var(--muted); font-size: 10.5px; line-height: 1.45; }
    .task-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .task-meta time { color: var(--red); font-size: 10px; font-weight: 700; }
    .tag, .status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 20px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface-3);
      color: var(--ink-2);
      font-size: 9.5px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status.good { color: var(--green); background: var(--green-soft); }
    .status.warn { color: var(--amber); background: var(--amber-soft); }
    .status.bad { color: var(--red); background: var(--red-soft); }
    .status.accent { color: var(--accent-ink); background: var(--accent-soft); }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      background: var(--surface);
    }
    .metric { padding: 13px 12px; border-right: 1px solid var(--line); }
    .metric:last-child { border-right: 0; }
    .metric b { display: block; font-size: 18px; margin-bottom: 3px; }
    .metric span { color: var(--muted); font-size: 9.5px; }

    .handoff-list { border: 1px solid var(--line); background: var(--surface); }
    .handoff {
      position: relative;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 9px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .handoff:last-child { border-bottom: 0; }
    .handoff-people { display: flex; align-items: center; gap: 5px; color: var(--muted); font-size: 9px; margin-bottom: 4px; }
    .mini-avatar {
      width: 19px;
      height: 19px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: #667085;
      font-size: 7px;
      font-weight: 800;
    }
    .handoff strong { display: block; font-size: 10.5px; line-height: 1.4; }
    .handoff p { margin: 4px 0 0; color: var(--muted); font-size: 9.5px; line-height: 1.45; }

    .data-table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--line); }
    .data-table th {
      height: 34px;
      padding: 0 11px;
      color: var(--muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--line);
      font-size: 9.5px;
      font-weight: 720;
      text-align: left;
    }
    .data-table td { padding: 11px; border-bottom: 1px solid var(--line); font-size: 10.5px; vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: 0; }
    .data-table tbody tr[data-project] { cursor: pointer; }
    .data-table tbody tr[data-project]:hover { background: #fafbfc; }
    .project-cell b { display: block; font-size: 11.5px; margin-bottom: 3px; }
    .project-cell span { color: var(--muted); font-size: 9.5px; }
    .health { display: flex; align-items: center; gap: 7px; }
    .health-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .health-dot.warn { background: var(--amber); }
    .health-dot.bad { background: var(--red); }

    .project-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 10px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 10.5px;
      padding: 0;
    }
    .project-title { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
    .project-title h1 { margin: 0; font-size: 21px; }
    .project-sub { margin-top: 6px; color: var(--muted); font-size: 11px; }
    .project-select { min-width: 184px; height: 34px; border: 1px solid var(--line-strong); border-radius: 5px; background: var(--surface); padding: 0 30px 0 10px; color: var(--ink-2); font-size: 10.5px; }

    .project-facts {
      display: grid;
      grid-template-columns: 1.4fr repeat(3, minmax(100px, .6fr));
      border: 1px solid var(--line);
      background: var(--surface);
      margin-bottom: 12px;
    }
    .fact { padding: 11px 13px; border-right: 1px solid var(--line); }
    .fact:last-child { border-right: 0; }
    .fact span { display: block; color: var(--muted); font-size: 9px; margin-bottom: 4px; }
    .fact b { font-size: 11px; line-height: 1.4; }

    .tabs {
      display: flex;
      gap: 3px;
      overflow-x: auto;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }
    .tab {
      flex: 0 0 auto;
      min-height: 39px;
      padding: 0 12px;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 10.5px;
      font-weight: 700;
    }
    .tab.on { color: var(--accent-ink); border-bottom-color: var(--accent); }

    .project-room {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 282px;
      gap: 22px;
      align-items: start;
    }
    .workspace { min-width: 0; }
    .workspace-title {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .workspace-title .task-ico { width: 38px; height: 38px; }
    .workspace-title h2 { margin: 0 0 4px; font-size: 15px; }
    .workspace-title p { margin: 0; color: var(--muted); font-size: 10.5px; line-height: 1.45; }
    .workspace-title .grow { flex: 1; }
    .workspace-band {
      padding: 13px 15px;
      margin-bottom: 15px;
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      color: var(--accent-ink);
      font-size: 10.5px;
      line-height: 1.55;
    }
    .workspace-band b { font-size: 11px; }

    .panel { border: 1px solid var(--line); background: var(--surface); }
    .panel + .panel { margin-top: 14px; }
    .panel-head {
      min-height: 43px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 13px;
      border-bottom: 1px solid var(--line);
    }
    .panel-head h3 { margin: 0; font-size: 11.5px; }
    .panel-head p { margin: 0; color: var(--muted); font-size: 9.5px; }
    .panel-head .grow { flex: 1; }
    .panel-body { padding: 13px; }

    .decision-layout { display: grid; grid-template-columns: 210px minmax(0, 1fr); min-height: 420px; }
    .decision-list { border-right: 1px solid var(--line); background: var(--surface-2); }
    .decision-item { padding: 12px; border-bottom: 1px solid var(--line); }
    .decision-item.on { background: var(--surface); box-shadow: inset 3px 0 var(--accent); }
    .decision-item b { display: block; font-size: 10.5px; margin: 5px 0; }
    .decision-item p { margin: 0; color: var(--muted); font-size: 9px; line-height: 1.4; }
    .decision-detail { padding: 16px; }
    .decision-detail h3 { margin: 0 0 5px; font-size: 15px; }
    .decision-detail > p { margin: 0 0 14px; color: var(--muted); font-size: 10.5px; line-height: 1.5; }
    .option-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
    .option { padding: 11px; border: 1px solid var(--line); border-radius: 5px; }
    .option.recommended { border-color: var(--accent); background: var(--accent-soft); }
    .option strong { display: block; font-size: 11px; margin-bottom: 8px; }
    .option dl { display: grid; grid-template-columns: 1fr auto; gap: 5px 8px; margin: 0; }
    .option dt, .option dd { margin: 0; font-size: 9.5px; }
    .option dt { color: var(--muted); }
    .option dd { font-weight: 700; }
    .explain {
      display: flex;
      gap: 8px;
      padding: 10px;
      margin: 12px 0;
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--ink-2);
      font-size: 9.5px;
      line-height: 1.5;
    }
    .decision-actions { display: flex; justify-content: flex-end; gap: 8px; }

    .workflow {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border: 1px solid var(--line);
      background: var(--surface);
    }
    .workflow-step { position: relative; padding: 12px 10px; border-right: 1px solid var(--line); }
    .workflow-step:last-child { border-right: 0; }
    .workflow-step b { display: block; font-size: 9.5px; margin-bottom: 4px; }
    .workflow-step small { color: var(--muted); font-size: 8.5px; }
    .workflow-step.done { background: var(--green-soft); }
    .workflow-step.current { background: var(--accent-soft); box-shadow: inset 0 -3px var(--accent); }

    .pipeline-board { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 8px; overflow-x: auto; }
    .pipeline-col { min-width: 150px; border: 1px solid var(--line); background: var(--surface-2); }
    .pipeline-col-head { display: flex; align-items: center; gap: 6px; padding: 9px; border-bottom: 1px solid var(--line); font-size: 9.5px; font-weight: 750; }
    .pipeline-col-head span { margin-left: auto; color: var(--muted); }
    .creator-card { margin: 7px; padding: 9px; border: 1px solid var(--line); border-radius: 5px; background: var(--surface); }
    .creator-top { display: flex; align-items: center; gap: 7px; }
    .creator-top b { font-size: 9.5px; }
    .creator-card p { margin: 6px 0 0; color: var(--muted); font-size: 8.5px; line-height: 1.4; }

    .split-work { display: grid; grid-template-columns: minmax(210px, .8fr) minmax(0, 1.2fr); min-height: 400px; }
    .inbox { border-right: 1px solid var(--line); }
    .inbox-row { padding: 11px; border-bottom: 1px solid var(--line); cursor: pointer; }
    .inbox-row.on { background: var(--accent-soft); }
    .inbox-row b { display: block; font-size: 10px; margin-bottom: 4px; }
    .inbox-row p { margin: 0; color: var(--muted); font-size: 8.5px; line-height: 1.35; }
    .conversation { padding: 15px; }
    .message-line { max-width: 88%; padding: 9px 10px; margin-bottom: 8px; border-radius: 6px; background: var(--surface-3); font-size: 9.5px; line-height: 1.5; }
    .message-line.out { margin-left: auto; background: var(--accent-soft); color: var(--accent-ink); }
    .draft-box { margin-top: 13px; padding: 11px; border: 1px solid var(--line-strong); background: var(--surface); }
    .draft-box textarea { width: 100%; min-height: 82px; border: 0; outline: 0; resize: vertical; color: var(--ink-2); background: transparent; font-size: 10px; line-height: 1.5; }
    .draft-foot { display: flex; align-items: center; gap: 8px; padding-top: 8px; border-top: 1px solid var(--line); }
    .draft-foot span { color: var(--muted); font-size: 8.5px; }
    .draft-foot .grow { flex: 1; }

    .checklist { display: grid; gap: 7px; }
    .check-row { display: grid; grid-template-columns: 25px minmax(0, 1fr) auto; gap: 9px; align-items: center; padding: 10px; border: 1px solid var(--line); background: var(--surface); }
    .check-icon { width: 24px; height: 24px; display: grid; place-items: center; border-radius: 50%; color: var(--green); background: var(--green-soft); }
    .check-icon.warn { color: var(--amber); background: var(--amber-soft); }
    .check-row b { display: block; font-size: 10px; }

      if (action === "generate-report") { toast("周报已生成到项目结果视图"); addAgent("周报已生成。我保留了数据范围、来源和两个证据缺口；生成对外链接前仍需你确认。"); return; }
      if (action === "adopt-learning") { toast("结论已写入《原神》游戏知识"); log("采纳项目复盘并写入游戏知识"); return; }
      if (action === "view-evidence") return openModal("归因证据", `当前只有 TikTok 点击和短链访问，没有平台授权的安装与付费事件。<br><br><b>结论：</b>可以确认内容带来访问，不能确认带来转化。下一轮需在项目开始前取得创作者授权并绑定归因链接。`, "知道了", () => { closeModal(); });
      if (action === "edit-learning") return openModal("编辑项目结论", `人工修改会覆盖 Agent 草案，并保留原文、修改人和时间。<textarea id="learning-edit">女性向腰部创作者贡献了 68% 的有效观看，单位触达成本比头部低 31%；越南市场因证据不足暂不归因。</textarea>`, "保存修改", () => { closeModal(); toast("结论已保存 · 人工修改已留痕"); log("编辑项目复盘结论"); });
      if (action === "edit-draft") { const draft = document.querySelector(".draft-box textarea"); if (draft) draft.focus(); toast("草稿已进入编辑状态"); return; }
      if (action === "view-comments") return openModal("初稿批注", `<b>品牌表达：</b>00:08–00:16 的口播过于接近硬广，建议改为实际体验。<br><br><b>披露：</b>#ad 已在画面中出现，但需要同步加入发布文案。<br><br><b>责任人：</b>Kenji · 等待创作者回传 v3。`, "知道了", () => { closeModal(); });
    }

    document.addEventListener("click", (e) => {
      const roleBtn = e.target.closest("#role-switch [data-role]");
      if (roleBtn) { state.role = roleBtn.dataset.role; state.route = "today"; state.tab = defaultTab(); state.messages[state.role] = [{ type: "agent", text: assistantGreeting() }]; $("#sidebar").classList.remove("open"); render(); return; }
      const navBtn = e.target.closest("[data-nav]");
      if (navBtn) { state.route = navBtn.dataset.nav; $("#sidebar").classList.remove("open"); render(); return; }
      const projectBtn = e.target.closest("[data-project], [data-open-project]");
      if (projectBtn) { state.projectId = projectBtn.dataset.project || projectBtn.dataset.openProject; state.route = "project"; state.tab = projectBtn.dataset.tab || defaultTab(); render(); return; }
      const tabBtn = e.target.closest("[data-tab]");
      if (tabBtn) { state.tab = tabBtn.dataset.tab; state.route = "project"; render(); return; }
      const promptBtn = e.target.closest("[data-prompt]");
      if (promptBtn) { submitAgent(promptBtn.dataset.prompt); return; }
      const actionBtn = e.target.closest("[data-action]");
      if (actionBtn) { handleAction(actionBtn.dataset.action); return; }
      if (e.target.closest("#menu-toggle")) { $("#sidebar").classList.toggle("open"); return; }
      if (e.target.closest("#assistant-toggle")) { $("#assistant").classList.add("open"); return; }
      if (e.target.closest("#assistant-close")) { $("#assistant").classList.remove("open"); return; }
    });

    document.addEventListener("change", (e) => { if (e.target.id === "project-select") { state.projectId = e.target.value; state.tab = defaultTab(); render(); } });
    $("#modal-cancel").onclick = closeModal;
    $("#modal-confirm").onclick = () => { if (modalCallback) modalCallback(); };
    $("#modal-scrim").addEventListener("click", (e) => { if (e.target.id === "modal-scrim") closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeModal(); $("#assistant").classList.remove("open"); $("#sidebar").classList.remove("open"); } });

    function submitAgent(value) {
      const text = (value || $("#agent-input").value).trim();
      if (!text) return;
      if (!state.messages[state.role]) state.messages[state.role] = [];
      state.messages[state.role].push({ type: "user", text });
      state.messages[state.role].push({ type: "agent", text: assistantReply(text) });
      $("#agent-input").value = "";
      renderAssistant(); safeIcons();
    }
    $("#agent-send").onclick = () => submitAgent();
    $("#agent-input").addEventListener("keydown", (e) => { if (e.key === "Enter") submitAgent(); });

    render();
  </script>
</body>
</html>
