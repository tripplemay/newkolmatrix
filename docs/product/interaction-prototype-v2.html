  :root{
    --bg:#eff2f9; --card:#ffffff; --lp:#f4f7fe;
    --ink:#1b254b; --head:#1b254b; --sub:#707eae; --muted:#a3aed0;
    --line:#e9edf7; --line-2:#e0e5f2;
    --brand:#422afb; --brand-600:#3311db; --brand-400:#7551ff; --brand-50:#e9e3ff; --brandlin:#868cff;
    --green:#01b574; --green-50:#e1fff4; --orange:#ffb547; --orange-50:#fff7eb; --red:#e31a1a; --red-50:#fce8e8;
    --blue:#3965ff;
    --shadow:14px 17px 40px 4px rgba(112,144,176,.08);
    --shadow-sm:0 20px 25px -5px rgba(112,144,176,.08),0 8px 10px -6px rgba(112,144,176,.08);
    --shadow-nav:0 8px 30px rgba(112,144,176,.18);
    --sidebar:285px; --copilot:360px; --rc:20px; --rb:12px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#070f2e; --card:#111c44; --lp:#1b254b;
      --ink:#ffffff; --head:#ffffff; --sub:#a3aed0; --muted:#7a86b6;
      --line:#1b254b; --line-2:#232c50;
      --brand:#7551ff; --brand-600:#5b3fff; --brand-400:#8f6bff; --brand-50:#1b254b; --brandlin:#868cff;
      --green:#01b574; --green-50:#0f2f2a; --orange:#ffb547; --orange-50:#332810; --red:#ee5d50; --red-50:#3a1d1d;
      --blue:#3965ff; --shadow:none; --shadow-sm:none; --shadow-nav:0 8px 30px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="light"]{--bg:#eff2f9;--card:#ffffff;--lp:#f4f7fe;--ink:#1b254b;--head:#1b254b;--sub:#707eae;--muted:#a3aed0;--line:#e9edf7;--line-2:#e0e5f2;--brand:#422afb;--brand-600:#3311db;--brand-400:#7551ff;--brand-50:#e9e3ff;--green:#01b574;--green-50:#e1fff4;--orange:#ffb547;--orange-50:#fff7eb;--red:#e31a1a;--red-50:#fce8e8;--shadow:14px 17px 40px 4px rgba(112,144,176,.08);--shadow-sm:0 20px 25px -5px rgba(112,144,176,.08),0 8px 10px -6px rgba(112,144,176,.08);--shadow-nav:0 8px 30px rgba(112,144,176,.18);}
  :root[data-theme="dark"]{--bg:#070f2e;--card:#111c44;--lp:#1b254b;--ink:#ffffff;--head:#ffffff;--sub:#a3aed0;--muted:#7a86b6;--line:#1b254b;--line-2:#232c50;--brand:#7551ff;--brand-600:#5b3fff;--brand-400:#8f6bff;--brand-50:#1b254b;--green:#01b574;--green-50:#0f2f2a;--orange:#ffb547;--orange-50:#332810;--red:#ee5d50;--red-50:#3a1d1d;--shadow:none;--shadow-sm:none;--shadow-nav:0 8px 30px rgba(0,0,0,.4);}

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft Yahei",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  b,strong{font-weight:700}
  .num{font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  svg.ic{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
  svg.ic.sm{width:14px;height:14px}svg.ic.lg{width:22px;height:22px}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:8px}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:15px}

  .app{display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr) var(--copilot);min-height:100vh}

  /* ============ Sidebar (real Horizon) ============ */
  .side{width:var(--sidebar);flex:none;background:var(--card);position:sticky;top:14px;height:calc(100vh - 28px);margin:14px 0 14px 14px;border-radius:20px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;padding:0 0 20px;z-index:30}
  .brand{display:flex;align-items:center;gap:11px;padding:32px 28px 26px;position:relative}
  .brand .mk{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brandlin),var(--brand));color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px}
  .brand b{font-size:22px;color:var(--head);font-weight:800;letter-spacing:-.02em}
  .brand small{font-size:22px;color:var(--head);font-weight:300}
  .brand-div{height:1px;background:var(--line-2);margin:0 20px 18px}
  .nav{display:flex;flex-direction:column;gap:2px;padding:0 16px;overflow-y:auto}
  .nav .grp{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:16px 14px 7px}
  .nav button{display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:0;color:var(--sub);font-size:15px;font-weight:500;width:100%;text-align:left;position:relative}
  .nav button .ic{color:var(--muted)}
  .nav button:hover{color:var(--head)}
  .nav button:hover .ic{color:var(--sub)}
  .nav button.on{color:var(--head);font-weight:700}
  .nav button.on .ic{color:var(--brand)}
  .nav button.on::after{content:"";position:absolute;right:0;top:50%;transform:translateY(-50%);width:4px;height:36px;border-radius:8px;background:var(--brand)}
  .nav .cnt{margin-left:auto;font-size:11px;font-weight:700;background:var(--brand);color:#fff;border-radius:20px;padding:1px 8px;min-width:22px;text-align:center}
  .side-cta{margin:auto 20px 0;border-radius:var(--rc);padding:0 20px 22px;background:linear-gradient(135deg,#868cff 0%,var(--brand) 100%);color:#fff;position:relative;overflow:hidden;text-align:center}
  .side-cta .orb{width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.12);position:absolute;top:-56px;left:50%;transform:translateX(-50%)}
  .side-cta .sc-ic{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;margin:26px auto 12px;position:relative}
  .side-cta b{display:block;font-size:15px;position:relative}
  .side-cta p{font-size:11.5px;line-height:1.5;color:rgba(255,255,255,.85);margin:6px 0 0;position:relative}

  /* ============ Main ============ */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;padding:0 22px}
  .navbar{position:sticky;top:12px;z-index:25;margin:14px 0 6px;display:flex;align-items:center;gap:16px;padding:12px 18px;border-radius:12px;background:color-mix(in srgb,var(--card) 30%,transparent);backdrop-filter:blur(24px)}
  .nb-l{min-width:0}
  .nb-crumb{font-size:12px;color:var(--sub)}.nb-crumb b{color:var(--head)}
  .nb-title{font-size:26px;color:var(--head);font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-top:2px}
  .nb-r{margin-left:auto;display:flex;align-items:center;gap:10px}
  .nb-search{display:flex;align-items:center;gap:8px;background:var(--lp);border-radius:30px;padding:9px 16px;color:var(--muted);min-width:180px}
  .nb-search input{border:0;background:none;outline:0;font:inherit;font-size:13px;color:var(--ink);width:100%}
  .nb-ico{width:40px;height:40px;border-radius:50%;background:var(--card);display:grid;place-items:center;color:var(--sub);box-shadow:var(--shadow-sm)}
  .nb-ico:hover{color:var(--brand)}
  .nb-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--brandlin),var(--brand));color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
  .view{flex:1;padding:8px 0 60px}
  .mobile-only{display:none}
  .agent-live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub);font-weight:600}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(1,181,116,.5)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}

  h2.title{font-size:22px;color:var(--head);font-weight:800;letter-spacing:-.01em}
  .lede{color:var(--sub);font-size:14px;margin-top:6px;max-width:76ch}
  .sec{margin-top:26px}
  .sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .sec-head h3{font-size:18px;color:var(--head);font-weight:700}
  .sec-head .meta{margin-left:auto;font-size:12.5px;color:var(--sub);font-weight:600}
  .card{background:var(--card);border-radius:var(--rc);box-shadow:var(--shadow)}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:30px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .pill.ac{background:var(--brand-50);color:var(--brand)}.pill.gd{background:var(--green-50);color:var(--green)}
  .pill.wn{background:var(--orange-50);color:#c27400}.pill.cr{background:var(--red-50);color:var(--red)}
  .pill.nu{background:var(--lp);color:var(--sub)}
  @media (prefers-color-scheme:dark){.pill.wn{color:var(--orange)}}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}.dot.gd{background:var(--green)}.dot.wn{background:var(--orange)}.dot.cr{background:var(--red)}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:var(--rb);font-size:13px;font-weight:700;color:#fff;background:var(--brand);transition:background .2s ease}
  .btn:hover{background:var(--brand-600)}
  .btn.ghost{background:var(--lp);color:var(--sub);box-shadow:none}.btn.ghost:hover{color:var(--brand)}
  .btn.sm{padding:8px 15px;font-size:12px}
  .btn.gate{background:var(--red)}
  .link{color:var(--brand);font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:4px}
  .ic-circle{width:56px;height:56px;border-radius:50%;background:var(--lp);color:var(--brand);display:grid;place-items:center;flex:none}
  .av{border-radius:50%;display:grid;place-items:center;font-weight:700;color:#fff;flex:none}

  /* KPI (MiniStatistics) */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  .kpi{display:flex;align-items:center;gap:12px;padding:16px 18px}
  .kpi .ic-circle{width:56px;height:56px}
  .kpi .k-name{font-size:14px;color:var(--muted);font-weight:500}
  .kpi .k-val{font-size:20px;color:var(--head);font-weight:700;margin-top:2px}
  .kpi .k-val small{font-size:12px;color:var(--green);font-weight:700;margin-left:6px}

  /* Today radar */
  .grid-2{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start}
  .radar{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .rcard{padding:22px;display:flex;flex-direction:column;gap:14px}
  .rcard .rc-top{display:flex;align-items:center;gap:10px}
  .rcard .rc-top b{font-size:15px;color:var(--head)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .rc-ask{background:var(--lp);border-radius:16px;padding:15px}
  .rc-ask .lbl{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--brand);margin-bottom:8px}
  .rc-ask b{font-size:15px;color:var(--head);display:block}
  .rc-ask .amt{font-size:12.5px;color:var(--sub);margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .irrev{display:inline-flex;align-items:center;gap:4px;color:var(--red);font-weight:700;font-size:11.5px}
  .rc-foot{display:flex;align-items:center;gap:10px;margin-top:auto}
  .rc-env{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:6px}
  .feed{padding:8px 22px 16px}
  .feed .f-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
  .feed .f-row:last-child{border-bottom:0}
  .feed .f-ic{width:38px;height:38px;border-radius:12px;background:var(--lp);color:var(--brand);display:grid;place-items:center;flex:none}
  .feed .f-b{min-width:0;flex:1}.feed .f-b b{font-size:13.5px;color:var(--head);display:block}.feed .f-b span{font-size:12px;color:var(--sub)}
  .feed time{font-size:11.5px;color:var(--muted);white-space:nowrap}
  .loads{padding:20px}
  .load{display:grid;grid-template-columns:34px 1fr 42px;align-items:center;gap:13px;margin-bottom:16px}
  .load:last-child{margin-bottom:0}
  .track{height:8px;border-radius:9999px;background:var(--line-2);overflow:hidden}
  .track>span{display:block;height:100%;background:var(--brand);border-radius:9999px}

  .card-head{display:flex;align-items:center;gap:10px;padding:20px 22px 0}
  .card-head h4{font-size:16px;color:var(--head);font-weight:700}.card-head .sub{font-size:12px;color:var(--sub)}
  .card-pad{padding:22px}

  /* Project shell + rail */
  .phead{display:flex;align-items:flex-start;gap:16px;margin:6px 0 20px}
  .pback{width:44px;height:44px;border-radius:14px;background:var(--card);display:grid;place-items:center;color:var(--sub);box-shadow:var(--shadow-sm);flex:none}
  .phead h2{font-size:23px;color:var(--head);font-weight:800}
  .phead .goal{color:var(--sub);font-size:13.5px;margin-top:7px;max-width:78ch}
  .pmeta{display:flex;gap:22px;margin-top:12px;flex-wrap:wrap}
  .pmeta span{font-size:12.5px;color:var(--sub);display:flex;align-items:center;gap:7px}.pmeta span b{color:var(--head)}
  .rail{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
  .rnode{flex:1;min-width:150px;display:flex;flex-direction:column;gap:11px;padding:18px;border-radius:var(--rc);background:var(--card);box-shadow:var(--shadow);text-align:left;position:relative;transition:.14s}
  .rnode:hover{transform:translateY(-2px)}
  .rnode.on{background:linear-gradient(135deg,var(--brand-400),var(--brand))}
  .rn-ico{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;background:var(--lp);color:var(--muted)}
  .rnode.done .rn-ico{background:var(--green-50);color:var(--green)}
  .rnode.on .rn-ico{background:rgba(255,255,255,.2);color:#fff}
  .rn-name{font-size:14px;font-weight:700;color:var(--head)}.rnode.on .rn-name{color:#fff}
  .rn-state{font-size:11.5px;color:var(--sub)}.rnode.on .rn-state{color:rgba(255,255,255,.8)}
  .rn-step{position:absolute;top:14px;right:16px;font-size:11px;font-weight:800;color:var(--muted)}.rnode.on .rn-step{color:rgba(255,255,255,.6)}

  .surface{margin-top:22px}
  .surf-label{display:flex;align-items:center;gap:11px;margin-bottom:16px}
  .surf-label .tag{font-size:11px;font-weight:800;letter-spacing:.03em;color:#fff;background:linear-gradient(135deg,var(--brand-400),var(--brand));padding:6px 13px;border-radius:9px}
  .surf-label .desc{font-size:13px;color:var(--sub)}

  /* glance */
  .glance{display:grid;grid-template-columns:1.15fr 1fr;gap:20px;align-items:start}
  .gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 4px}
  .gauge{position:relative;width:230px;height:130px}
  .gauge .gv{position:absolute;bottom:0;left:0;right:0;text-align:center}
  .gauge .gv b{font-size:32px;color:var(--head);font-weight:800}.gauge .gv small{display:block;font-size:12px;color:var(--sub)}
  .mrow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
  .mtile{padding:14px;border-radius:14px;background:var(--lp)}
  .mtile .mt-n{font-size:11.5px;color:var(--sub);font-weight:600}.mtile .mt-v{font-size:19px;color:var(--head);font-weight:800;margin-top:4px}.mtile .mt-s{font-size:11px;color:var(--muted)}
  .timeline{padding:4px 22px 22px}
  .tstep{position:relative;padding:0 0 18px 26px}.tstep:last-child{padding-bottom:0}
  .tstep::before{content:"";position:absolute;left:7px;top:9px;bottom:-2px;width:2px;background:var(--line-2)}.tstep:last-child::before{display:none}
  .tstep::after{content:"";position:absolute;left:2px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--card);border:2.5px solid var(--line-2)}
  .tstep.done::after{background:var(--green);border-color:var(--green)}
  .tstep.cur::after{background:var(--brand);border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-50)}
  .tstep b{font-size:14px;color:var(--head)}.tstep p{font-size:12px;color:var(--sub);margin-top:3px}
  .tstep .who{font-size:11.5px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:5px}.tstep.cur .who{color:var(--brand);font-weight:700}
  .blocker{margin-top:16px;display:flex;gap:12px;padding:15px;border-radius:16px;background:var(--orange-50)}
  .blocker .ic{color:var(--orange)}.blocker b{font-size:13px;color:var(--head)}.blocker p{font-size:12px;color:var(--sub);margin-top:3px}
  .chartcard{padding:22px}
  .chart-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:6px}
  .chart-big{font-size:30px;color:var(--head);font-weight:800;letter-spacing:-.01em}
  .chart-sub{font-size:12.5px;color:var(--sub);margin-top:2px}
  .chart-badge{display:inline-flex;align-items:center;gap:5px;color:var(--green);font-weight:700;font-size:13px;background:var(--green-50);padding:6px 11px;border-radius:12px}

  /* compare matrix */
  .compare{overflow-x:auto}
  .cmatrix{display:grid;grid-template-columns:130px repeat(3,minmax(170px,1fr));min-width:700px;border-radius:var(--rc);overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
  .cmatrix>div{padding:16px 18px;border-bottom:1px solid var(--line)}
  .cmatrix .rowlab{font-size:12px;color:var(--sub);font-weight:700;display:flex;align-items:center}
  .cmatrix .col-h b{font-size:14.5px;color:var(--head)}.cmatrix .col-h small{display:block;font-size:11px;color:var(--brand);font-weight:800;margin-top:3px}
  .cmatrix .col-h.best{background:linear-gradient(135deg,rgba(117,81,255,.08),rgba(66,42,251,.1))}
  .cmatrix .cell b{font-size:16px;color:var(--head)}.cmatrix .cell small{color:var(--sub);font-size:11.5px;display:block;line-height:1.45}
  .cmatrix .cell.pick{background:var(--brand-50)}
  @media (prefers-color-scheme:dark){.cmatrix .cell.pick{background:rgba(117,81,255,.12)}}
  .cmatrix .foot{border-bottom:0}
  .minibars{display:flex;gap:3px;align-items:flex-end;height:24px;margin-top:5px}
  .minibars i{flex:1;background:var(--brand);border-radius:2px;opacity:.35}.minibars i.hi{opacity:1}

  /* table (DataTable) */
  .tbl-wrap{overflow-x:auto;border-radius:var(--rc);background:var(--card);box-shadow:var(--shadow)}
  table.tbl{width:100%;border-collapse:collapse;min-width:640px}
  table.tbl th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);padding:16px 18px;border-bottom:1px solid var(--line)}
  table.tbl td{padding:15px 18px;border-bottom:1px solid var(--line);font-size:13.5px;color:var(--ink)}
  table.tbl tr:last-child td{border-bottom:0}
  table.tbl .who{display:flex;align-items:center;gap:11px}
  table.tbl .who b{font-size:13.5px;color:var(--head);display:block}table.tbl .who small{font-size:11.5px;color:var(--sub)}
  .cond{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700}
  .cond.ok{color:var(--green)}.cond.miss{color:var(--orange)}.cond.na{color:var(--muted)}

  /* inbox */
  .inbox{display:grid;grid-template-columns:280px minmax(0,1fr) 240px;border-radius:var(--rc);overflow:hidden;background:var(--card);box-shadow:var(--shadow);min-height:540px}
  .ib-list{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
  .ib-search{padding:16px}.ib-search .box{display:flex;align-items:center;gap:8px;background:var(--lp);border-radius:14px;padding:10px 14px;color:var(--muted)}
  .ib-search input{border:0;background:none;outline:0;font:inherit;font-size:13px;color:var(--ink);width:100%}
  .ib-rows{overflow-y:auto;flex:1}
  .ibrow{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:11px;width:100%;text-align:left;align-items:center}
  .ibrow:hover{background:var(--lp)}.ibrow.on{background:var(--brand-50)}
  @media (prefers-color-scheme:dark){.ibrow.on{background:rgba(117,81,255,.12)}}
  .ibrow .ib-b{min-width:0;flex:1}
  .ibrow .r1{display:flex;align-items:center;gap:7px}.ibrow .r1 b{font-size:13.5px;color:var(--head)}.ibrow .r1 time{margin-left:auto;font-size:10.5px;color:var(--muted)}
  .ibrow p{font-size:11.5px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:3px}
  .ib-thread{display:flex;flex-direction:column;min-width:0}
  .th-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .th-head b{font-size:15px;color:var(--head)}.th-head .sub{font-size:11.5px;color:var(--sub)}
  .th-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:var(--lp)}
  .msg{max-width:82%;padding:12px 15px;border-radius:16px;font-size:13px;line-height:1.5;background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}
  .msg.out{align-self:flex-end;background:linear-gradient(135deg,var(--brand-400),var(--brand));color:#fff;border-bottom-right-radius:5px;box-shadow:none}
  .msg:not(.out){border-bottom-left-radius:5px}
  .msg .mt{font-size:10px;opacity:.7;margin-top:5px}
  .draft{border-top:1px solid var(--line);padding:16px 20px}
  .draft .dlbl{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--brand);margin-bottom:10px}
  .draft textarea{width:100%;min-height:70px;border:1px solid var(--line-2);border-radius:14px;padding:12px;font:inherit;font-size:13px;line-height:1.5;resize:vertical;background:var(--lp);color:var(--ink)}
  .draft textarea:focus{outline:none;border-color:var(--brand)}
  .draft-foot{display:flex;align-items:center;gap:10px;margin-top:11px;flex-wrap:wrap}
  .draft-foot .hint{font-size:11.5px;color:var(--sub);display:flex;align-items:center;gap:6px}.draft-foot .sp{flex:1;min-width:8px}
  .ib-ctx{border-left:1px solid var(--line);padding:18px 16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
  .ctx-block .cb-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:9px}
  .ctx-stat{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;color:var(--sub)}.ctx-stat b{color:var(--head)}
  .match-ring{display:flex;flex-direction:column;align-items:center;gap:6px}

  /* reconcile */
  .recon{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start}
  .retro{margin-top:20px;padding:24px;border-radius:var(--rc);background:linear-gradient(135deg,rgba(117,81,255,.08),rgba(66,42,251,.06))}
  .retro .dlbl{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--brand);margin-bottom:11px}
  .retro p{font-size:13.5px;color:var(--ink);line-height:1.65}
  .retro .rfoot{display:flex;gap:11px;margin-top:17px;flex-wrap:wrap}
  .gaprow{display:flex;gap:11px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--line);font-size:12.5px;color:var(--ink)}
  .gaprow:last-child{border-bottom:0}.gaprow .ic{color:var(--orange);margin-top:1px}
  .legend{display:flex;flex-direction:column;gap:11px;margin-top:6px}
  .legend .lg{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--sub)}.legend .lg b{margin-left:auto;color:var(--head)}
  .legend .sw{width:12px;height:12px;border-radius:4px}

  /* ============ Copilot (AI-native driver) ============ */
  .copilot{background:var(--card);border-left:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;z-index:20}
  .cop-head{background:linear-gradient(135deg,#868cff 0%,var(--brand) 100%);color:#fff;padding:20px;display:flex;align-items:center;gap:12px}
  .cop-head .dm{width:42px;height:42px;border-radius:13px;background:rgba(255,255,255,.2);display:grid;place-items:center}
  .cop-head b{font-size:15px;display:block}.cop-head small{font-size:11.5px;color:rgba(255,255,255,.85)}
  .cop-auto{display:flex;gap:9px;align-items:flex-start;padding:13px 18px;font-size:11.5px;line-height:1.5;color:var(--sub);background:var(--lp);border-bottom:1px solid var(--line)}
  .cop-auto .ic{color:var(--brand);margin-top:1px}.cop-auto b{color:var(--head)}
  .cop-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .cop-did{background:var(--lp);border-radius:14px;padding:14px 16px}
  .cop-did .h{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:9px}
  .cop-did .r{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--ink);padding:4px 0}.cop-did .r .ic{color:var(--green);margin-top:1px}
  .cmsg{display:flex;max-width:100%}.cmsg.u{justify-content:flex-end}
  .cmsg .cb{max-width:255px;padding:12px 14px;border-radius:16px;font-size:12.5px;line-height:1.55;background:var(--lp);color:var(--ink)}
  .cmsg.a .cb{border-bottom-left-radius:5px}
  .cmsg.u .cb{background:linear-gradient(135deg,var(--brand-400),var(--brand));color:#fff;border-bottom-right-radius:5px}
  .act{display:flex;align-items:center;gap:11px;padding:12px;border-radius:14px;background:var(--card);box-shadow:var(--shadow-sm);cursor:pointer;width:100%;text-align:left;transition:.14s}
  .act:hover{transform:translateX(2px)}
  .act .ic-circle{width:40px;height:40px}
  .act b{font-size:13px;color:var(--head);display:block}.act span{font-size:11px;color:var(--sub);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .act .chev{color:var(--muted);flex:none}
  .cop-prompts{display:flex;gap:7px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid var(--line)}
  .chip{border:1px solid var(--line-2);border-radius:30px;padding:7px 13px;font-size:12px;color:var(--sub);font-weight:600;cursor:pointer}.chip:hover{border-color:var(--brand);color:var(--brand)}
  .cop-input{display:grid;grid-template-columns:1fr 44px;gap:9px;padding:14px 16px;border-top:1px solid var(--line)}
  .cop-input input{height:44px;border:1px solid var(--line-2);border-radius:14px;padding:0 14px;font:inherit;font-size:13px;background:var(--lp);color:var(--ink)}
  .cop-input input:focus{outline:none;border-color:var(--brand)}
  .cop-input button{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--brand-400),var(--brand));color:#fff;display:grid;place-items:center}
  .nb-cmd{display:flex;align-items:center;gap:9px;background:var(--lp);border-radius:30px;padding:10px 18px;min-width:280px;color:var(--brand)}
  .nb-cmd input{border:0;background:none;outline:0;font:inherit;font-size:13px;color:var(--ink);width:100%}
  .nb-cmd input::placeholder{color:var(--muted)}
  /* multi-agent squad / scope / collab */
  .cop-scope{border-left:3px solid var(--brand);background:var(--lp);border-radius:0 12px 12px 0;padding:11px 14px;display:flex;flex-direction:column;gap:7px}
  .cop-scope .cs-row{display:flex;gap:9px;font-size:11.5px;line-height:1.45}
  .cop-scope .cs-k{flex:none;width:28px;font-weight:700;color:var(--head)}
  .cop-scope .cs-row span:last-child{color:var(--sub)}
  .collab{border:1px dashed var(--line-2);border-radius:14px;padding:12px 14px}
  .collab .cl-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px}
  .collab .cl-item{border-top:1px solid var(--line)}
  .collab .cl-item:first-of-type{border-top:0}
  .collab .cl-row{position:relative;display:flex;flex-direction:column;gap:3px;padding:10px 22px 10px 0;width:100%;text-align:left;background:none;cursor:pointer}
  .collab .cl-row:hover .cl-t{color:var(--ink)}
  .collab .cl-pair{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700}.collab .cl-pair span{color:var(--muted);font-weight:400}
  .collab .cl-t{font-size:11px;color:var(--sub);line-height:1.4}
  .collab .cl-chev{position:absolute;right:0;top:12px;color:var(--muted);transition:transform .16s}
  .collab .cl-row.open .cl-chev{transform:rotate(90deg)}
  .cl-detail{padding:2px 0 12px}
  .ho-turn{border-left:2px solid var(--line-2);padding:5px 0 5px 11px;margin-bottom:8px}
  .ho-turn b{display:block;font-size:10.5px;margin-bottom:2px}
  .ho-turn span{font-size:11.5px;color:var(--sub);line-height:1.5}
  .ho-meta{margin-top:9px;display:flex;flex-direction:column;gap:8px}
  .ho-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--brand);background:var(--brand-50);padding:6px 11px;border-radius:10px;align-self:flex-start;line-height:1.35}
  .ho-out{display:flex;align-items:flex-start;gap:6px;font-size:11.5px;font-weight:700;color:var(--green);line-height:1.4}
  .squad-c .sq-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:8px}
  .squad-c .sq-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line);font-size:12.5px}
  .squad-c .sq-row:first-of-type{border-top:0}
  .squad-c .sq-dot{width:9px;height:9px;border-radius:50%;flex:none}
  .squad-c .sq-row b{color:var(--head);flex:none}
  .squad-c .sq-now{color:var(--sub);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px}
  .squad-c .sq-st{font-size:10.5px;font-weight:700;color:var(--brand);flex:none}
  .squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:20px}
  .sqcard{padding:20px;display:flex;gap:14px}
  .sqcard .sq-ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;flex:none}
  .sqcard b{font-size:14.5px;color:var(--head)}
  .sqcard .sq-duty{font-size:11.5px;color:var(--sub);margin-top:4px;line-height:1.45}

/* ---------- icons ---------- */

/* ---------- svg charts (ApexCharts-like) ---------- */
function areaChart(data,{w=520,h=150,color='var(--brand)',id='a'}={}){
  const max=Math.max(...data)*1.15,min=Math.min(...data)*0.85,pad=6;
  const X=i=>pad+i*(w-2*pad)/(data.length-1), Y=v=>h-pad-(v-min)/(max-min)*(h-2*pad);
  const PT=data.map((v,i)=>[X(i),Y(v)]);let line=`M${PT[0][0].toFixed(1)} ${PT[0][1].toFixed(1)}`;
  for(let i=0;i<PT.length-1;i++){const p0=PT[i-1]||PT[i],p1=PT[i],p2=PT[i+1],p3=PT[i+2]||p2;const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;line+=` C${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;}
  const area=`${line} L${X(data.length-1).toFixed(1)} ${h} L${pad} ${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px">
    <defs><linearGradient id="g${id}" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g${id})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${X(data.length-1).toFixed(1)}" cy="${Y(data[data.length-1]).toFixed(1)}" r="4.5" fill="var(--card)" stroke="${color}" stroke-width="3"/></svg>`;
}
function barChart(data,{w=520,h=170,pad=8}={}){
  const max=Math.max(...data.map(d=>d.v))*1.12, n=data.length, bw=(w-2*pad)/n*0.5;
  return `<svg viewBox="0 0 ${w} ${h+22}" style="width:100%;height:${h+22}px">

function donut(segs,{s=150}={}){
  const cx=s/2,cy=s/2,r=s/2-14,C=2*Math.PI*r;let off=0;
  const arcs=segs.map(g=>{const len=g.p/100*C,el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${g.c}" stroke-width="18" stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>`;off+=len;return el;}).join('');
  return `<svg viewBox="0 0 ${s} ${s}" style="width:${s}px;height:${s}px">${arcs}</svg>`;
}

function chrome(){

  else{const f=NAV.find(n=>n[0]===state.route);crumb='工作台';title=f?f[2]:'';}

function audFor(genre,i){
  let b;
  if(/射击|竞技|动作/.test(genre)) b={gm:[82,18],age:[['18-24',46],['25-34',36],['35+',18]],games:[['硬核射击',54],['竞技 FPS',28],['泛动作',18]]};
  else if(/休闲|亲子/.test(genre)) b={gm:[40,60],age:[['18-24',22],['25-34',42],['35+',36]],games:[['休闲农场',46],['益智',30],['亲子',24]]};
  else if(/生存|建造|教程/.test(genre)) b={gm:[74,26],age:[['18-24',34],['25-34',44],['35+',22]],games:[['生存建造',50],['开放世界',30],['沙盒',20]]};
  else if(/模拟|经营|生活|美食|视觉|角色/.test(genre)) b={gm:[36,64],age:[['18-24',30],['25-34',46],['35+',24]],games:[['模拟经营',44],['生活养成',32],['二次元',24]]};
  else b={gm:[55,45],age:[['18-24',36],['25-34',40],['35+',24]],games:[['综合',40],['策略',32],['休闲',28]]};
  const R=[[['北美',42],['东南亚',28],['其他',30]],[['日本',48],['东亚',30],['其他',22]],[['北美',38],['欧洲',34],['其他',28]],[['东南亚',44],['东亚',32],['其他',24]]];
  return {...b,region:R[i%R.length]};
}
function sampleTitle(g,k){const s=/射击|竞技/.test(g)?['公测首曝10分钟实机','双武器连招教学','天梯上分实录']:/模拟|经营|生活|美食|视觉|角色/.test(g)?['角色养成全流程','料理收集图鉴','轻松单手试玩']:/休闲|亲子/.test(g)?['萌系农场开荒','好友互助玩法','亲子同乐时刻']:/生存|建造|教程/.test(g)?['开局生存指南','深度建造展示','抢先体验实录']:['上手体验','玩法解析','实况录像'];return s[k%s.length];}
function sampleHook(g){return /射击|竞技/.test(g)?'实机手感 + 独家档期':/模拟|生活|美食|视觉|角色/.test(g)?'养成体验 + 美术调性':/休闲|亲子/.test(g)?'碎片可玩 + 家庭向':'更新节奏 + 深度玩法';}
function detailFor(c,i){
  const a=audFor(c.genre,i),cn={A:92,B:84,C:71}[c.cred]||80,fn=parseFloat(c.fans),F=/射击|竞技/.test(c.genre)?'实机长视频':/模拟|生活|美食|视觉|角色/.test(c.genre)?'角色图文':'实况直播';
  return {
    aud:a,real:cn+(i%3-1),active:Math.max(42,cn-8+(i%5-2)),
    perf:{plays:(fn*0.28).toFixed(1)+'万',er:(3.2+(i%5)*0.4).toFixed(1)+'%',cr:(58+(i%6)*3)+'%',trend:[58,60,59,63,64,66,69,71].map(x=>x+(i%4))},
    deliver:{reach:(fn*3.1).toFixed(0)+'万',conv:(c.match/10).toFixed(1)+'k',cpm:'$'+(6.2-(c.match-70)*0.06).toFixed(1)},
    collab:c.reuse>0?Array.from({length:Math.min(c.reuse,2)},(_,k)=>({proj:['星轨协议','料理次元','暗域拓荒'][(i+k)%3],form:F,price:'$'+(1.8+k*0.6).toFixed(1)+'k',quality:k===0?'优':'良',ontime:true})):[],
    rival:/射击|竞技/.test(c.genre)?['同类射击 A','竞技手游 B']:/模拟|生活|美食|视觉|角色/.test(c.genre)?['生活手游 C']:['同品类 D'],
    resp:['当天内','1 天内','2 天内'][i%3],last:c.ad==='warn'?'有 1 次延迟交付记录':'上次合作交付准时',
    price:{video:'$'+(1.6+fn*0.03).toFixed(1)+'k',short:'$'+(0.9+fn*0.015).toFixed(1)+'k',live:'$'+(1.4+fn*0.02).toFixed(1)+'k'},
    exclusive:i%3===0?'无竞品限制':'非独家 · 无同期竞品',schedule:['公测周有档','2 周后有档','需协调档期'][i%3],
    risk:{ad:c.ad==='ok'?'良好 · 历次均披露':'待核 · 1 次披露缺失',late:c.ad==='warn'?1:0,safety:c.cred},
    samples:Array.from({length:3},(_,k)=>({title:sampleTitle(c.genre,k),views:(fn*(0.2+k*0.05)).toFixed(0)+'万',er:(3.0+k*0.6).toFixed(1)+'%'})),
    judge:{
      match:`受众与本季游戏品类匹配 ${c.match}%，${cn>=90?'粉丝真实性高':'真实性中上'}，建议${c.match>=80?'优先':'可选'}加入匹配。`,
      reach:`历史响应${['当天内','1 天内','2 天内'][i%3]}，建议开价约 ${(1.6+fn*0.03).toFixed(1)}k 起；切入点：${sampleHook(c.genre)}。`,

    }
  };
}

  }
  if(state.route==='insight'){const ag=AGENTS.insight;return {agent:ag,sub:ag.en+' · 跨项目 ROI',did:['汇总 4 个项目的 ROI 与转化','起草本周周报草案'],greet:'我是洞察 Agent。本季综合 ROI 3.8x，料理次元最高(4.6x)、萌宠农场偏低(2.1x)。要我拆解萌宠农场吗？',acts:[],prompts:['为什么萌宠农场 ROI 低','生成本周周报','哪个项目该加投']};}
  if(state.route==='runs'){return {orchestrator:true,agent:ORCH,sub:'全编队留痕',did:['记录 24 项自动动作','标注 3 项不可逆动作留痕'],greet:'我是编排 Agent。这里是全编队的动作留痕——自动完成、需你确认、已拦截、不可逆都可查。要按类型筛选吗？',acts:[],prompts:['只看不可逆动作','谁拦截了什么','今天自动做了多少']};}
  if(state.route==='creators'){const ag=AGENTS.match;return {agent:ag,sub:ag.en+' · 跨项目发现',did:['按你的项目品类预排序 248 位创作者','标记 54 位高复用价值创作者'],greet:'我是匹配 Agent。库里 248 位创作者已按你在跑的项目品类排序。要我把高匹配的加入某个项目吗？',acts:[],prompts:['找射击向创作者','谁复用价值最高','加入料理次元匹配']};}
  if(state.route==='knowledge'){const ag=AGENTS.strategy;return {agent:ag,sub:ag.en+' · 知识底座',did:['解析你上传的 12 份游戏素材','从素材提炼卖点 / 受众 / 合规红线'],greet:'我是策略 Agent。这个知识库由你上传的素材构成——我解析素材、提炼游戏特点，再喂给匹配、触达、合规各环节。上传新素材后我会自动重新分析。要看哪个游戏？',acts:[],prompts:['这个游戏还缺哪类素材','刚上传的素材解析出什么','对比两个游戏受众']};}
  return {orchestrator:true,agent:ORCH,sub:'协调 5 位环节专家',squad:ROSTER,
    did:['编排 5 位专家 Agent 的夜间任务','把 3 个待确认动作汇总到你面前'],
    greet:'我是编排 Agent，负责在环节间调度专家 Agent。今天有 3 个动作在等你，要我带你去哪个？',
    acts:PROJECTS.filter(p=>p.ask).map(p=>({icon:envMeta(p.ask.env).icon,title:p.ask.title,sub:p.game+' · '+AGENTS[AGENT_BY_ENV[p.ask.env]].name,go:'enter:'+p.id+':'+p.ask.env})),
    prompts:['谁在等我回复','各 Agent 在忙什么','汇总今天进展']};
}
function copReply(text){
  if(/等我回复|谁在等|谁回复/.test(text)){const w=CREATORS.filter(c=>c.stage==='已回复'||c.stage==='谈判中');return {who:'a',t:`有 ${w.length} 位创作者在等你，我已备好草稿：`,acts:w.map(c=>({icon:'mail',title:c.name,sub:c.stage+' · '+c.last,go:'pick:'+c.id}))};}
  if(/更多|再找|找.*(创作者|人)|补.*位/.test(text)){const more=[['BlastGun','YouTube · 44万',81],['FPS狂人','Bilibili · 72万',78],['TriggerZ','TikTok · 95万',75]];return {who:'a',t:'我按硬核射击向受众又找到 3 位高匹配创作者，可加入触达：',acts:more.map(x=>({icon:'users',title:x[0]+' · 匹配 '+x[2]+'%',sub:x[1],go:'env:reach'}))};}
  if(/汇总|进展|总结|今天/.test(text))return {who:'a',t:'今天：4 个项目在跑，3 个动作等你确认（发 12 封邀约 / 批一组方案 / 放款 $1,600）。Agent 已自动完成 24 项，触达信号 +12%。'};
  if(/为什么|依据|解释|推荐/.test(text))return {who:'a',t:'均衡组受众匹配 74%、覆盖与预算最平衡；生活流组缺 2 位头部，头部组超预算 $2,600——所以我推荐均衡组。要我直接生效它吗？'};
  if(/留存/.test(text))return {who:'a',t:'7 日留存偏低集中在北美安卓，但该渠道缺归因回传，暂不能归因于创作者。建议下次前置埋点。'};
  if(/报告|分享/.test(text))return {who:'a',t:'我可以生成对外分享报告，但这是对外动作——会先弹确认让你核对数据范围与有效期。'};
  if(/各.*agent|在忙|编队|谁在忙|哪些.*agent/i.test(text))return {who:'a',t:'当前编队：策略 Agent 监测健康度、匹配 Agent 待你确认组合、触达 Agent 待你发 12 封邀约、交付 Agent 待放款、洞察 Agent 待采纳复盘、合规 Agent 巡检 #ad——各司其职，需要时我来协调。'};
  if(/合规|授权|复核/.test(text))return {who:'a',t:'我已请合规 Agent 复核：授权范围（北美区社媒 · 6 个月）与 #ad 披露均通过；ArkPlays 的终稿披露缺失已被拦下。'};
  if(/roi 低|萌宠|加投|哪个项目/i.test(text))return {who:'a',t:'萌宠农场 ROI 2.1x 偏低，主因 7 日留存弱（北美安卓归因缺失）；料理次元 4.6x 最高，建议把预算向它倾斜。'};
  if(/周报/.test(text))return {who:'a',t:'本周周报草案已生成：综合 ROI 3.8x(+0.1)、总触达 24.6M、4 个项目均正向。要生成对外分享版吗？那是对外动作，会先弹确认。'};
  if(/不可逆|留痕/.test(text))return {who:'a',t:'本周不可逆动作 3 项：发邀约给 GG龙、放款 $1,600 给 MeepleMax、确认报价 $3,400 给 PixelHana——均为你确认后执行，已留痕可查。'};
  if(/拦截|拦下/.test(text))return {who:'a',t:'交付 Agent 拦截了 ArkPlays 的 $1,200 放款（缺 #ad 披露）；合规 Agent 未放行 2 位存疑候选。'};
  return {who:'a',t:'收到。我会把当前环节能自动做的先做完，需要你拍板的动作会停在你面前。'};
}
function copSend(text){text=(text||'').trim();if(!text)return;state.cop=state.cop||[];state.cop.push({who:'u',t:text});state.cop.push(copReply(text));renderCopilot();}
function copAct(spec){const a=spec.split(':');
  if(a[0]==='enter')go('project',a[1],a[2]);
  else if(a[0]==='pick'){state.pick=a[1];state.route='project';state.pid='xg';state.env='reach';state.copKey=null;render();}
  else if(a[0]==='env'){state.route='project';state.env=a[1];render();}
}
function renderCopilot(){
  const ctx=copContext(),key=state.route+'/'+state.env,ag=ctx.agent||ORCH;
  if(state.copKey!==key){state.copKey=key;state.cop=[{who:'a',t:ctx.greet,acts:ctx.acts}];state.openCollab=new Set();}
  state.openCollab=state.openCollab||new Set();
  $('#cop-name').textContent=ag.name;$('#cop-ctx').textContent=ctx.sub||'';
  $('#cop-hic').innerHTML=ic(ag.ic||'spark');
  $('#cop-head').style.background=`linear-gradient(135deg, color-mix(in srgb, ${ag.c} 55%, #ffffff), ${ag.c})`;
  const scope=`<div class="cop-scope" style="border-color:${ag.c}"><div class="cs-row"><span class="cs-k">职责</span><span>${esc(ag.duty)}</span></div><div class="cs-row"><span class="cs-k">隔离</span><span>${esc(ag.iso)}</span></div></div>`;
  const squad=ctx.squad?`<div class="squad-c"><div class="sq-h">Agent 编队 · 各司其职</div>${ctx.squad.map(s=>{const a=AGENTS[s.k];return `<div class="sq-row"><span class="sq-dot" style="background:${a.c}"></span><b>${a.name}</b><span class="sq-now">${esc(s.now)}</span><span class="sq-st">${esc(s.status)}</span></div>`;}).join('')}</div>`:'';
  const did=(ctx.did&&ctx.did.length)?`<div class="cop-did"><div class="h">${esc(ag.name)} 刚刚完成</div>${ctx.did.map(d=>`<div class="r">${ic('check','ic sm')}<span>${esc(d)}</span></div>`).join('')}</div>`:'';
  const collab=(ctx.collab&&ctx.collab.length)?`<div class="collab"><div class="cl-h">${ic('users','ic sm')}本环节协同 · 多 Agent 联动 · 点开看交接</div>${ctx.collab.map((cb,i)=>{
    const open=state.openCollab.has(state.env+':'+i),A=AGENTS[cb.a],B=AGENTS[cb.b];
    const detail=open?`<div class="cl-detail">${cb.handoff.map(h=>{const g=AGENTS[h.from];return `<div class="ho-turn" style="border-color:${g.c}"><b style="color:${g.c}">${g.name}</b><span>${esc(h.t)}</span></div>`;}).join('')}<div class="ho-meta"><span class="ho-chip">${ic('spark','ic sm')}交接物：${esc(cb.payload)}</span><div class="ho-out">${ic('check','ic sm')}<span>${esc(cb.outcome)}</span></div></div></div>`:'';
    return `<div class="cl-item"><button class="cl-row ${open?'open':''}" data-collab="${i}"><span class="cl-pair"><b style="color:${A.c}">${A.name}</b><span>↔</span><b style="color:${B.c}">${B.name}</b></span><span class="cl-t">${esc(cb.t)}</span><span class="cl-chev">${ic('chev','ic sm')}</span></button>${detail}</div>`;
  }).join('')}</div>`:'';
  const msgs=state.cop.map(m=>{
    if(m.who==='u')return `<div class="cmsg u"><div class="cb">${esc(m.t)}</div></div>`;
    const acts=(m.acts||[]).map(a=>`<button class="act" data-act="${a.go}"><span class="ic-circle">${ic(a.icon,'ic sm')}</span><div style="min-width:0;flex:1"><b>${esc(a.title)}</b><span>${esc(a.sub)}</span></div><span class="chev">${ic('chev','ic sm')}</span></button>`).join('');
    return `<div class="cmsg a"><div class="cb">${esc(m.t)}</div></div>${acts}`;
  }).join('');
  $('#cop-body').innerHTML=(squad||scope)+did+collab+msgs;$('#cop-body').scrollTop=$('#cop-body').scrollHeight;
  $('#cop-prompts').innerHTML=(ctx.prompts||[]).map(p=>`<button class="chip" data-prompt="${esc(p)}">${esc(p)}</button>`).join('');
  $('#cop-body').querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>copAct(b.dataset.act));
  $('#cop-body').querySelectorAll('[data-collab]').forEach(b=>b.onclick=()=>{const k=state.env+':'+b.dataset.collab;state.openCollab.has(k)?state.openCollab.delete(k):state.openCollab.add(k);renderCopilot();});
  $('#cop-prompts').querySelectorAll('[data-prompt]').forEach(b=>b.onclick=()=>copSend(b.dataset.prompt));
}

/* ---------- static ---------- */
$('#cta-ic').innerHTML=ic('shield');$('#menu').innerHTML=ic('menu');
$('#cop-hic').innerHTML=ic('spark');$('#cop-aic').innerHTML=ic('shield','ic sm');$('#cop-send').innerHTML=ic('up','ic sm');$('#cmd-ic').innerHTML=ic('spark','ic sm');$('#cop-toggle').innerHTML=ic('spark');
$('#menu').onclick=()=>$('#side').classList.toggle('open');
$('#cop-toggle').onclick=()=>$('#copilot').classList.toggle('open');
$('#cop-send').onclick=()=>{const el=$('#cop-in');copSend(el.value);el.value='';};
$('#cop-in').addEventListener('keydown',e=>{if(e.key==='Enter'){copSend(e.target.value);e.target.value='';}});
$('#cmd-in').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.value.trim()){copSend(e.target.value);e.target.value='';$('#copilot').classList.add('open');}});
function syncTheme(){const cur=document.documentElement.getAttribute('data-theme');const dark=cur?cur==='dark':matchMedia('(prefers-color-scheme:dark)').matches;$('#theme').innerHTML=ic(dark?'sun':'moon');}
$('#theme').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme');const dark=cur?cur==='dark':matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',dark?'light':'dark');syncTheme();};
function openCreator(i){
  $('#drawer').innerHTML=renderDrawer(i);$('#dwscrim').classList.add('on');
  const dr=$('#drawer');
  dr.querySelector('[data-dwclose]').onclick=closeCreator;
  const add=dr.querySelector('[data-dwadd]');if(add)add.onclick=()=>{toast('已把 '+add.dataset.dwadd+' 加入《料理次元》匹配候选池，匹配 Agent 会重排');closeCreator();};
  const w=dr.querySelector('[data-dwwatch]');if(w)w.onclick=()=>toast('已标记关注该创作者');
  const b=dr.querySelector('.dw-body');if(b)b.scrollTop=0;
}
function closeCreator(){$('#dwscrim').classList.remove('on');}
$('#dwscrim').onclick=e=>{if(e.target===$('#dwscrim'))closeCreator();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCreator();closeGate();}});

syncTheme();render();
</script>
