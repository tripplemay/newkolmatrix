<title>KOLMatrix · Agent 驱动交互原型</title>
<style>
  :root{
    --bg:#EEF2FB; --surface:#FFFFFF; --surface-2:#F4F7FE; --surface-3:#FBFCFF;
    --ink:#111C44; --ink-2:#1B2559; --soft:#707EAE; --muted:#A3AED0;
    --brand:#422AFB; --brand-lite:#7551FF; --brand-deep:#2A1CB8;
    --brand-ghost:#EDEAFF;
    --good:#05CD99; --good-bg:#E6FAF5; --warn:#FFB547; --warn-bg:#FFF6E6; --bad:#EE5D50; --bad-bg:#FDECEA;
    --line:#E4E9F5; --line-2:#EDF1FA;
    --shadow:0 18px 40px rgba(112,144,176,.14);
    --shadow-sm:0 6px 18px rgba(112,144,176,.12);
    --shadow-brand:0 12px 26px rgba(66,42,251,.28);
    --r-lg:20px; --r-md:14px; --r-sm:10px;
    --font-body:'DM Sans','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
    --font-head:'Poppins','DM Sans','Segoe UI',system-ui,sans-serif;
    --rail-w:250px; --dock-w:388px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0B1437; --surface:#111C44; --surface-2:#0F1A3C; --surface-3:#16224F;
      --ink:#FFFFFF; --ink-2:#E9EEFB; --soft:#A3AED0; --muted:#7A88B8;
      --brand-ghost:#241C63; --line:#ffffff14; --line-2:#ffffff0d;
      --shadow:0 18px 44px rgba(0,0,0,.44); --shadow-sm:0 8px 20px rgba(0,0,0,.34);
      --good-bg:#0c2c28; --warn-bg:#332711; --bad-bg:#341916;
    }
  }
  :root[data-theme="dark"]{
    --bg:#0B1437; --surface:#111C44; --surface-2:#0F1A3C; --surface-3:#16224F;
    --ink:#FFFFFF; --ink-2:#E9EEFB; --soft:#A3AED0; --muted:#7A88B8;
    --brand-ghost:#241C63; --line:#ffffff14; --line-2:#ffffff0d;
    --shadow:0 18px 44px rgba(0,0,0,.44); --shadow-sm:0 8px 20px rgba(0,0,0,.34);
    --good-bg:#0c2c28; --warn-bg:#332711; --bad-bg:#341916;
  }
  :root[data-theme="light"]{
    --bg:#EEF2FB; --surface:#FFFFFF; --surface-2:#F4F7FE; --surface-3:#FBFCFF;
    --ink:#111C44; --ink-2:#1B2559; --soft:#707EAE; --muted:#A3AED0;
    --brand-ghost:#EDEAFF; --line:#E4E9F5; --line-2:#EDF1FA;
    --shadow:0 18px 40px rgba(112,144,176,.14); --shadow-sm:0 6px 18px rgba(112,144,176,.12);
    --good-bg:#E6FAF5; --warn-bg:#FFF6E6; --bad-bg:#FDECEA;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
  h1,h2,h3,h4{font-family:var(--font-head);color:var(--ink);margin:0;text-wrap:balance;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:20px}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:6px}
  .tnum{font-variant-numeric:tabular-nums}
  .ic{width:18px;height:18px;flex:none}

  /* ---------- App frame ---------- */
  .app{display:grid;grid-template-columns:var(--rail-w) 1fr var(--dock-w);height:100vh;padding-top:30px}

  /* ---------- Prototype ribbon ---------- */
  .ribbon{position:fixed;top:0;left:0;right:0;height:30px;z-index:60;
    background:linear-gradient(90deg,var(--brand),var(--brand-lite));color:#fff;
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-size:11.5px;letter-spacing:.03em;font-weight:600}
  .ribbon b{font-weight:700}
  .ribbon .dot{width:6px;height:6px;border-radius:50%;background:#fff;opacity:.7}

  /* ---------- Sidebar ---------- */
  .rail{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;
    padding:22px 18px;gap:6px;min-height:0}
  .brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px;border-bottom:1px solid var(--line-2);margin-bottom:14px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand-lite),var(--brand));
    box-shadow:var(--shadow-brand);display:grid;place-items:center;color:#fff;font-weight:800;font-family:var(--font-head);font-size:17px}
  .brand .wm{font-family:var(--font-head);font-weight:700;font-size:19px;color:var(--ink);letter-spacing:-.02em}
  .brand .wm span{color:var(--brand)}
  .nav-label{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:12px 10px 6px}
  .nav-item{display:flex;align-items:center;gap:13px;padding:11px 12px;border-radius:var(--r-md);color:var(--soft);
    font-weight:600;font-size:14px;transition:background .15s,color .15s;position:relative;text-align:left;width:100%}
  .nav-item .ic{width:20px;height:20px;flex:none;stroke-width:2}
  .nav-item:hover{background:var(--surface-2);color:var(--ink-2)}
  .nav-item.active{color:var(--brand);font-weight:700}
  .nav-item.active .ic{color:var(--brand)}
  .nav-item.active::before{content:"";position:absolute;right:-18px;top:50%;transform:translateY(-50%);
    width:4px;height:26px;border-radius:8px 0 0 8px;background:var(--brand)}
  .nav-badge{margin-left:auto;font-size:10px;font-weight:700;background:var(--brand-ghost);color:var(--brand);
    padding:2px 7px;border-radius:20px}
  .rail-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line-2)}
  .userchip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-md)}
  .userchip .av{width:32px;height:32px;border-radius:9px;background:var(--brand-ghost);color:var(--brand);
    display:grid;place-items:center;font-weight:700;font-family:var(--font-head)}
  .userchip .nm{font-weight:700;font-size:13px;color:var(--ink-2)}
  .userchip .rl{font-size:11px;color:var(--muted)}

  /* ---------- Canvas ---------- */
  .canvas{min-width:0;min-height:0;display:flex;flex-direction:column;background:var(--bg)}
  .topbar{display:flex;align-items:center;gap:14px;padding:16px 28px;flex:none}
  .crumb{font-size:12px;color:var(--muted);font-weight:600}
  .crumb b{color:var(--soft)}
  .ttl{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--ink)}
  .topbar .spacer{flex:1}
  .icon-btn{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--line);
    display:grid;place-items:center;color:var(--soft);box-shadow:var(--shadow-sm)}
  .icon-btn:hover{color:var(--brand)}
  .canvas-scroll{flex:1;overflow-y:auto;padding:6px 28px 40px;min-height:0}

  .card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:22px}

  /* empty state */
  .empty{max-width:640px;margin:34px auto 0;text-align:center}
  .empty .halo{width:76px;height:76px;margin:0 auto 20px;border-radius:22px;
    background:linear-gradient(135deg,var(--brand-lite),var(--brand));box-shadow:var(--shadow-brand);
    display:grid;place-items:center;color:#fff}
  .empty h2{font-size:26px;margin-bottom:10px}
  .empty p{color:var(--soft);font-size:15px;max-width:480px;margin:0 auto 22px}
  .starter{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .starter button{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
    padding:12px 16px;color:var(--ink-2);font-weight:600;font-size:13px;box-shadow:var(--shadow-sm);
    display:flex;align-items:center;gap:9px;transition:transform .12s,box-shadow .12s,border-color .12s;text-align:left}
  .starter button:hover{transform:translateY(-2px);border-color:var(--brand);box-shadow:var(--shadow)}
  .starter button .k{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none;color:#fff}

  .section-h{display:flex;align-items:center;gap:12px;margin:26px 2px 14px}
  .section-h h3{font-size:16px}
  .section-h .sub{font-size:12.5px;color:var(--muted);font-weight:600}
  .section-h .spacer{flex:1}
  .pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
  .pill.brand{background:var(--brand-ghost);color:var(--brand)}
  .pill.good{background:var(--good-bg);color:var(--good)}
  .pill.warn{background:var(--warn-bg);color:#B9820B}
  .pill.bad{background:var(--bad-bg);color:var(--bad)}
  .pill.ghost{background:var(--surface-2);color:var(--soft)}

  /* KOL cards */
  .kol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:16px}
  .kol{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);border:1px solid var(--line-2);
    padding:18px;display:flex;flex-direction:column;gap:13px;transition:box-shadow .15s,transform .15s,opacity .3s,border-color .15s}
  .kol:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
  .kol.accepted{border-color:var(--good);box-shadow:0 0 0 1px var(--good) inset, var(--shadow-sm)}
  .kol.skipped{opacity:.4;filter:grayscale(.5)}
  .kol-top{display:flex;gap:12px;align-items:center;cursor:pointer}
  .kol-top:hover .kol-nm{color:var(--brand)}
  .kol-av{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;font-weight:800;
    font-family:var(--font-head);font-size:18px;flex:none}
  .kol-id{min-width:0}
  .kol-nm{font-family:var(--font-head);font-weight:700;font-size:15px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .12s}
  .kol-meta{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .safety{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:6px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:3px}
  .safety.a{background:var(--good-bg);color:var(--good)}
  .safety.b{background:var(--warn-bg);color:#B9820B}
  .kol-score{margin-left:auto;text-align:center;flex:none}
  .kol-score .v{font-family:var(--font-head);font-weight:800;font-size:20px;line-height:1;color:var(--brand)}
  .kol-score .l{font-size:9.5px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  .kol-tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;font-weight:600;color:var(--soft);background:var(--surface-2);padding:3px 9px;border-radius:8px}
  .tag.tier{background:var(--brand-ghost);color:var(--brand)}
  .kol-why{font-size:12.5px;color:var(--soft);line-height:1.5;background:var(--surface-2);border-radius:var(--r-sm);
    padding:10px 12px;border-left:3px solid var(--brand-lite)}
  .kol-why b{color:var(--ink-2);font-weight:700}
  .kol-act{display:flex;gap:9px;margin-top:2px}
  .btn{border-radius:var(--r-sm);font-weight:700;font-size:13px;padding:9px 14px;transition:filter .15s,background .15s,transform .1s;
    display:inline-flex;align-items:center;justify-content:center;gap:7px}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(135deg,var(--brand-lite),var(--brand));color:#fff;box-shadow:var(--shadow-brand);flex:1}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.soft{background:var(--surface-2);color:var(--soft);flex:none}
  .btn.soft:hover{color:var(--ink-2)}
  .btn.good{background:var(--good);color:#fff;flex:1}
  .btn.ok{background:var(--good-bg);color:var(--good);flex:1;cursor:default}
  .btn.line{background:var(--surface);border:1px solid var(--line);color:var(--soft)}
  .btn.sm{padding:7px 12px;font-size:12px}

  /* draft cards */
  .draft{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden}
  .draft-h{display:flex;align-items:center;gap:11px;padding:16px 20px;border-bottom:1px solid var(--line-2);background:var(--surface-3)}
  .draft-h .ic{width:20px;height:20px;color:var(--brand)}
  .draft-h h4{font-size:15px}
  .draft-h .pill{margin-left:auto}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-2)}
  .field{background:var(--surface);padding:13px 20px}
  .field.full{grid-column:1/-1}
  .field .k{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .field .v{font-size:13.5px;color:var(--ink-2);font-weight:600;line-height:1.45}
  .field .v .edit{font-size:11px;color:var(--brand);font-weight:700;margin-left:8px;cursor:pointer}
  .draft-foot{padding:15px 20px;display:flex;align-items:center;gap:12px;border-top:1px solid var(--line-2);flex-wrap:wrap}
  .draft-foot .hint{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .draft-foot .hint .ic{width:14px;height:14px;color:var(--brand)}
  .draft-foot .spacer{flex:1}

  /* readiness block (stage gate) */
  .ready{margin:16px 20px;background:var(--good-bg);border-radius:var(--r-md);padding:15px 17px}
  .ready.pend{background:var(--warn-bg)}
  .ready .rt{display:flex;align-items:center;gap:8px;font-family:var(--font-head);font-weight:700;font-size:13.5px;color:var(--ink-2);margin-bottom:4px}
  .ready .rt .ic{width:16px;height:16px;color:var(--good)}
  .ready.pend .rt .ic{color:#B9820B}
  .ready .rs{font-size:12px;color:var(--soft);margin-bottom:10px}
  .ready .checks{display:flex;flex-wrap:wrap;gap:7px 16px}
  .ready .chk{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-2)}
  .ready .chk .ic{width:13px;height:13px;color:var(--good)}
  .ready .chk.warn .ic{color:#B9820B}

  /* email preview */
  .mail-body{padding:16px 20px;font-size:13px;color:var(--soft);line-height:1.6;white-space:pre-line}
  .mail-body .subj{color:var(--ink-2);font-weight:700;font-family:var(--font-head);margin-bottom:8px;font-size:14px}
  .rationale{margin:0 20px 16px;font-size:12px;color:var(--soft);background:var(--warn-bg);border-radius:var(--r-sm);
    padding:10px 12px;border-left:3px solid var(--warn)}
  .rationale b{color:#B9820B}

  /* insight / dashboard */
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px}
  .kpi{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:18px;display:flex;gap:14px;align-items:center}
  .kpi .kic{width:44px;height:44px;border-radius:13px;background:var(--brand-ghost);color:var(--brand);display:grid;place-items:center;flex:none}
  .kpi .kv{font-family:var(--font-head);font-weight:800;font-size:22px;color:var(--ink);line-height:1.1}
  .kpi .kl{font-size:12px;color:var(--muted);font-weight:600}
  .bars{display:flex;flex-direction:column;gap:14px;margin-top:6px}
  .bar-row{display:grid;grid-template-columns:140px 1fr 54px;align-items:center;gap:14px}
  .bar-row .nm{font-size:13px;font-weight:600;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{height:12px;border-radius:20px;background:var(--surface-2);overflow:hidden}
  .bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand-lite),var(--brand));
    transform-origin:left;animation:grow .8s cubic-bezier(.2,.7,.2,1)}
  .bar-fill.dim{background:linear-gradient(90deg,#A3AED0,#8f9cc4)}
  .bar-row .vv{font-family:var(--font-head);font-weight:800;font-size:14px;color:var(--brand);text-align:right}
  @keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}

  .insight-box{display:flex;gap:13px;background:var(--brand-ghost);border-radius:var(--r-md);padding:15px 17px;margin-top:4px}
  .insight-box .ic{width:22px;height:22px;color:var(--brand);flex:none;margin-top:1px}
  .insight-box p{margin:0;font-size:13.5px;color:var(--ink-2);line-height:1.55}
  .insight-box b{color:var(--brand)}

  .refine-note{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px dashed var(--line);
    border-radius:var(--r-md);padding:12px 16px;margin-bottom:16px;color:var(--soft);font-size:12.5px;font-weight:600}
  .refine-note .ic{width:17px;height:17px;color:var(--muted)}
  .refine-note button{margin-left:auto;font-size:12px;font-weight:700;color:var(--brand);
    background:var(--brand-ghost);padding:6px 12px;border-radius:20px;flex:none}

  .anim-in{animation:pop .38s cubic-bezier(.2,.7,.2,1) both}
  @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* ---------- Cockpit ---------- */
  .cockpit-hd{display:flex;align-items:center;gap:14px;margin:4px 2px 16px}
  .greeting{font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
  .cockpit-hd .sub{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:3px}
  .digest{display:flex;gap:13px;align-items:center;background:linear-gradient(115deg,var(--brand-ghost),transparent 78%);
    border:1px solid var(--line);border-radius:var(--r-md);padding:14px 18px;margin-bottom:6px}
  .digest .orb{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--brand-lite),var(--brand));
    box-shadow:var(--shadow-brand);display:grid;place-items:center;color:#fff;flex:none}
  .digest p{margin:0;font-size:13.5px;color:var(--ink-2);line-height:1.5}.digest b{color:var(--brand);font-weight:700}
  .ops-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;margin-top:18px}
  .panel{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);padding:20px}
  .panel-h{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .panel-h .ic{color:var(--brand)} .panel-h h3{font-size:15px}
  .panel-h .sub{font-size:11.5px;color:var(--muted);font-weight:600;margin-left:auto}
  .camp-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line-2)}
  .camp-item:first-of-type{border-top:none;padding-top:2px}
  .camp-item .ci-main{min-width:0;flex:1}
  .camp-item .ci-nm{font-weight:700;font-size:13.5px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .camp-item .ci-meta{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .camp-item .ci-prog{width:58px;height:6px;border-radius:20px;background:var(--surface-2);overflow:hidden;flex:none}
  .camp-item .ci-prog i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand-lite),var(--brand))}
  .camp-item .ci-right{font-family:var(--font-head);font-weight:800;font-size:13px;color:var(--brand);flex:none;width:42px;text-align:right}
  .queue-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line-2)}
  .queue-item:first-of-type{border-top:none;padding-top:2px}
  .queue-item .qic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:none}
  .queue-item .qm{flex:1;min-width:0}
  .queue-item .qt{font-weight:700;font-size:13px;color:var(--ink-2)}
  .queue-item .qs{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
  .qbtn{font-size:12px;font-weight:700;color:var(--brand);background:var(--brand-ghost);padding:7px 13px;border-radius:20px;flex:none;white-space:nowrap}
  .qbtn:hover{filter:brightness(.97)}
  .tone-good{background:var(--good-bg);color:var(--good)}.tone-warn{background:var(--warn-bg);color:#B9820B}
  .tone-brand{background:var(--brand-ghost);color:var(--brand)}.tone-bad{background:var(--bad-bg);color:var(--bad)}
  .dash-starters{margin-top:24px}
  .dash-starters .lead{display:flex;align-items:center;gap:9px;margin:0 2px 13px}
  .dash-starters .lead .ic{color:var(--brand)} .dash-starters .lead h3{font-size:15px}
  .dash-starters .lead .sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
  .dash-starters .starter{justify-content:flex-start}

  /* ---------- Campaigns list ---------- */
  .summary-row{display:flex;gap:26px;flex-wrap:wrap;margin:2px 2px}
  .summary-row .s{display:flex;flex-direction:column}
  .summary-row .s .v{font-family:var(--font-head);font-weight:800;font-size:21px;color:var(--ink)}
  .summary-row .s .l{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
  .camp-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(304px,1fr));gap:16px}
  .cc{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);border:1px solid var(--line-2);
    padding:18px;cursor:pointer;transition:box-shadow .15s,transform .15s,border-color .15s;display:flex;flex-direction:column;gap:13px}
  .cc:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--brand)}
  .cc-top{display:flex;align-items:flex-start;gap:11px}
  .cc-ic{width:40px;height:40px;border-radius:12px;background:var(--brand-ghost);color:var(--brand);display:grid;place-items:center;flex:none}
  .cc-nm{font-family:var(--font-head);font-weight:700;font-size:14.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cc-sub{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cc-top .pill{margin-left:auto;flex:none}
  .cc-stage{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--brand)}
  .cc-stage .ic{width:13px;height:13px}
  .cc-stats{display:flex;gap:16px;padding:12px 0;border-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2)}
  .cc-stats .st{min-width:0}
  .cc-stats .st .v{font-family:var(--font-head);font-weight:800;font-size:14px;color:var(--ink-2);white-space:nowrap}
  .cc-stats .st .l{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .cc-sug{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--soft);font-weight:600}
  .cc-sug .ic{color:var(--brand);width:15px;height:15px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--soft);margin:0 0 12px}
  .back-btn:hover{color:var(--brand)}

  /* ---------- Project pipeline (6 stages) ---------- */
  .proj-hd{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:18px}
  .proj-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .proj-top .pic{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--brand-lite),var(--brand));
    box-shadow:var(--shadow-brand);display:grid;place-items:center;color:#fff;flex:none}
  .proj-top h3{font-size:17px}
  .proj-top .url{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
  .proj-top .pill{margin-left:auto}
  .steps{display:flex;margin-top:20px}
  .step{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;padding:0 4px;cursor:pointer}
  .step::before{content:"";position:absolute;top:13px;left:-50%;width:100%;height:2px;background:var(--line)}
  .step:first-child::before{display:none}
  .step.done::before,.step.cur::before{background:var(--brand)}
  .step .sdot{width:27px;height:27px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;
    font-family:var(--font-head);background:var(--surface-2);color:var(--muted);position:relative;z-index:1;
    border:2px solid var(--line);transition:transform .12s;margin:0 auto}
  /* 环节 owner 头像：责任链在 stepper 上一眼可见 */
  .step .sown{position:absolute;right:-7px;bottom:-5px;width:15px;height:15px;border-radius:50%;
    display:grid;place-items:center;font-size:8px;font-weight:800;font-style:normal;color:#fff;
    border:1.5px solid var(--surface);font-family:var(--font-head)}
  .step:hover .sdot{transform:scale(1.1)}
  .step.done .sdot{background:var(--brand-ghost);color:var(--brand);border-color:var(--brand)}
  .step.cur .sdot{background:linear-gradient(135deg,var(--brand-lite),var(--brand));color:#fff;border-color:var(--brand);box-shadow:var(--shadow-brand)}
  .step .snm{font-size:11px;font-weight:700;color:var(--muted);text-align:center;line-height:1.25}
  .step.done .snm,.step.cur .snm{color:var(--ink-2)}
  .step.view .snm{color:var(--brand)}
  .step.view .sdot{outline:2px solid var(--brand);outline-offset:2px}
  .stage-note{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:600;margin:0 2px 12px}
  .stage-note .ic{width:14px;height:14px}

  /* portfolio (智能匹配组合) */
  .pf-slots{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;padding:16px 20px 4px}
  .slot{background:var(--surface-2);border-radius:var(--r-md);padding:13px 15px;text-align:center}
  .slot .sv{font-family:var(--font-head);font-weight:800;font-size:19px;color:var(--ink)}
  .slot .sl{font-size:11px;color:var(--soft);font-weight:700;margin-top:2px}
  .slot .sd{font-size:10.5px;color:var(--muted);font-weight:600;margin-top:3px}
  .risk-list{padding:4px 20px 8px;display:flex;flex-direction:column;gap:9px}
  .risk{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--soft);line-height:1.5;
    background:var(--warn-bg);border-radius:var(--r-sm);padding:10px 12px}
  .risk .ic{width:15px;height:15px;color:#B9820B;margin-top:1px}
  .risk b{color:var(--ink-2)}
  .risk.gap{background:var(--bad-bg)} .risk.gap .ic{color:var(--bad)}
  .bench{display:flex;align-items:center;gap:8px;padding:4px 20px 16px;font-size:12px;color:var(--soft);font-weight:600;flex-wrap:wrap}
  .bench .tag{background:var(--surface-2)}

  /* deliverables table */
  .deliv{padding:6px 20px 12px}
  .drow{display:grid;grid-template-columns:1.2fr 1.4fr .9fr auto;gap:12px;align-items:center;padding:11px 0;border-top:1px solid var(--line-2)}
  .drow:first-child{border-top:none}
  .drow .dk{font-weight:700;font-size:13px;color:var(--ink-2)}
  .drow .di{font-size:12.5px;color:var(--soft);font-weight:600}
  .drow .dv{font-size:11.5px;color:var(--muted);font-weight:600}
  .drow .dact{display:flex;align-items:center;gap:8px;justify-content:flex-end}

  /* reply workspace */
  .reply{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);border:1px solid var(--line-2);
    padding:18px;margin-bottom:14px}
  .reply-top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  .reply-top .kol-av{width:38px;height:38px;font-size:15px;border-radius:11px}
  .reply-top .rn{font-family:var(--font-head);font-weight:700;font-size:14px;color:var(--ink)}
  .reply-top .rm{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
  .reply-top .pill{margin-left:auto}
  .reply ul{margin:0 0 11px;padding-left:18px;color:var(--soft);font-size:12.5px;line-height:1.7}
  .reply ul b{color:var(--ink-2)}
  .next-box{display:flex;gap:10px;align-items:flex-start;background:var(--brand-ghost);border-radius:var(--r-sm);
    padding:10px 13px;font-size:12.5px;color:var(--ink-2);line-height:1.5;margin-bottom:12px}
  .next-box .ic{width:15px;height:15px;color:var(--brand);margin-top:2px}
  .reply-foot{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .owner{font-size:11px;font-weight:700;color:var(--soft);background:var(--surface-2);padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
  .reply-foot .spacer{flex:1}

  /* KOL profile (关系资产) */
  .prof-hd{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:22px;display:flex;gap:16px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .prof-hd .kol-av{width:62px;height:62px;font-size:24px;border-radius:17px}
  .prof-hd .pn{font-family:var(--font-head);font-weight:700;font-size:19px;color:var(--ink)}
  .prof-hd .pm{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .prof-hd .spacer{flex:1}
  .arc-item{padding:11px 0;border-top:1px solid var(--line-2);font-size:12.5px;color:var(--soft);line-height:1.55}
  .arc-item:first-of-type{border-top:none;padding-top:2px}
  .arc-item b{color:var(--ink-2)} .arc-item .when{font-size:11px;color:var(--muted);font-weight:700}

  /* ---------- P0-F1 评估面板（受众 + 可信度 + 溯源）---------- */
  .src{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:6px;display:inline-flex;align-items:center;gap:3px;
    letter-spacing:.02em;white-space:nowrap;cursor:help}
  .src.first{background:var(--good-bg);color:var(--good)}
  .src.third{background:var(--brand-ghost);color:var(--brand)}
  .src.infer{background:var(--warn-bg);color:#B9820B}
  .src.none{background:var(--surface-2);color:var(--muted)}
  .eval-sub{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 9px}
  .eval-sub:first-of-type{margin-top:2px}
  .dist{display:flex;flex-direction:column;gap:8px}
  .dist-row{display:grid;grid-template-columns:70px 1fr 38px;align-items:center;gap:10px;font-size:12px}
  .dist-row .dl{color:var(--soft);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dist-row .dt{height:8px;border-radius:20px;background:var(--surface-2);overflow:hidden}
  .dist-row .df{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand-lite),var(--brand));
    transform-origin:left;animation:grow .7s cubic-bezier(.2,.7,.2,1)}
  .dist-row .dv{text-align:right;font-weight:700;color:var(--ink-2)}
  .split{display:flex;height:28px;border-radius:9px;overflow:hidden;font-size:11px;font-weight:800;color:#fff}
  .split div{display:grid;place-items:center;transition:flex .3s}
  .cred-hero{display:flex;align-items:center;gap:16px;padding:14px 16px;border-radius:var(--r-md);background:var(--surface-2);margin-bottom:4px}
  .cred-num{font-family:var(--font-head);font-weight:800;font-size:40px;line-height:1}
  .cred-hero .cl{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .cred-hero .cd{font-size:12.5px;color:var(--soft);font-weight:600;margin-top:3px;line-height:1.45}
  .cred-hero .spacer{flex:1}
  .sig{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line-2)}
  .sig:first-of-type{border-top:none}
  .sig .ic{width:14px;height:14px;margin-top:2px}
  .sig.ok .ic{color:var(--good)} .sig.warn .ic{color:#B9820B} .sig.bad .ic{color:var(--bad)}
  .sig .sn{font-weight:700;color:var(--ink-2);font-size:12.5px}
  .sig .sd{color:var(--muted);font-size:11.5px;margin-top:1px}
  .provenance{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px dashed var(--line);
    border-radius:var(--r-md);padding:11px 15px;margin-bottom:16px;font-size:12px;color:var(--soft);font-weight:600;flex-wrap:wrap}
  .provenance .ic{width:15px;height:15px;color:var(--brand)}
  .cred-chip{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}
  .cred-chip.hi{background:var(--good-bg);color:var(--good)}
  .cred-chip.mid{background:var(--warn-bg);color:#B9820B}
  .cred-chip.lo{background:var(--bad-bg);color:var(--bad)}

  /* ---------- P1 key / missions / settle ---------- */
  .partner{font-size:9.5px;font-weight:800;background:var(--surface-2);color:var(--soft);padding:3px 8px;border-radius:6px;
    display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .partner b{color:var(--ink-2)}
  .funnel{display:grid;grid-template-columns:repeat(auto-fit,minmax(104px,1fr));gap:10px;padding:16px 20px 6px}
  .fn{background:var(--surface-2);border-radius:var(--r-md);padding:12px 14px;text-align:center;position:relative}
  .fn .fv{font-family:var(--font-head);font-weight:800;font-size:19px;color:var(--ink)}
  .fn .fl{font-size:11px;color:var(--soft);font-weight:700;margin-top:2px}
  .fn .fr{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
  .fn.hi .fv{color:var(--brand)}
  .krow{display:grid;grid-template-columns:1.1fr repeat(3,60px) 1fr;gap:10px;align-items:center;padding:10px 0;border-top:1px solid var(--line-2);font-size:12.5px}
  .krow:first-of-type{border-top:none}
  .krow .kn{font-weight:700;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .krow .kc{text-align:center;font-weight:700;color:var(--soft);font-variant-numeric:tabular-nums}
  .khead{color:var(--muted);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .mrow{padding:13px 0;border-top:1px solid var(--line-2)}
  .mrow:first-of-type{border-top:none;padding-top:2px}
  .mtop{display:flex;align-items:center;gap:9px;margin-bottom:8px;flex-wrap:wrap}
  .mtop .mn{font-weight:700;font-size:13px;color:var(--ink-2)}
  .mtop .mk{font-size:11px;color:var(--muted);font-weight:600}
  .mtop .spacer{flex:1}
  .mtop .mp{font-family:var(--font-head);font-weight:800;font-size:14px;color:var(--brand)}
  .mbar{display:grid;grid-template-columns:1fr 108px;gap:12px;align-items:center}
  .mtrack{height:9px;border-radius:20px;background:var(--surface-2);overflow:hidden}
  .mfill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand-lite),var(--brand));animation:grow .8s cubic-bezier(.2,.7,.2,1);transform-origin:left}
  .mfill.done{background:linear-gradient(90deg,#05CD99,#04a97e)}
  .mnum{font-size:11.5px;color:var(--muted);font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
  .srow{display:grid;grid-template-columns:1fr 76px 88px 88px auto;gap:10px;align-items:center;padding:11px 0;border-top:1px solid var(--line-2);font-size:12.5px}
  .srow:first-of-type{border-top:none}
  .srow .sn2{font-weight:700;color:var(--ink-2)}
  .srow .sc{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
  .srow .sa{font-family:var(--font-head);font-weight:800;color:var(--ink-2);font-variant-numeric:tabular-nums}

  /* ---------- 项目知识库 ---------- */
  .kb-hero{display:flex;align-items:center;gap:22px;background:linear-gradient(120deg,var(--brand-ghost),transparent 72%);
    border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:16px;flex-wrap:wrap}
  .kb-hero .kh-l{flex:1;min-width:220px}
  .kb-hero .kh-t{font-size:13px;color:var(--soft);font-weight:600;line-height:1.6}
  .kb-hero .kh-t b{color:var(--ink)}
  .kb-hero .big{font-family:var(--font-head);font-weight:800;font-size:40px;line-height:1;color:var(--brand)}
  .kb-hero .cap{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
  .cov-track{height:9px;border-radius:20px;background:var(--surface-2);overflow:hidden;margin-top:10px}
  .cov-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand-lite),var(--brand));animation:grow .8s cubic-bezier(.2,.7,.2,1);transform-origin:left}
  .upload{display:flex;align-items:center;gap:14px;border:2px dashed var(--line);border-radius:var(--r-lg);
    padding:18px 22px;margin-bottom:18px;background:var(--surface);transition:border-color .15s,background .15s;cursor:pointer;flex-wrap:wrap}
  .upload:hover{border-color:var(--brand);background:var(--surface-3)}
  .upload .uic{width:44px;height:44px;border-radius:13px;background:var(--brand-ghost);color:var(--brand);display:grid;place-items:center;flex:none}
  .upload .ut{font-family:var(--font-head);font-weight:700;font-size:14px;color:var(--ink)}
  .upload .us{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
  .upload .modes{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .mode{font-size:10.5px;font-weight:700;color:var(--soft);background:var(--surface-2);padding:4px 9px;border-radius:7px;
    display:inline-flex;align-items:center;gap:4px}
  .mode .ic{width:12px;height:12px;color:var(--brand)}
  .kb-layer{margin-bottom:18px}
  .lhead{display:flex;align-items:center;gap:11px;padding:15px 20px;background:var(--surface-3);border-bottom:1px solid var(--line-2);flex-wrap:wrap}
  .lhead .lic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none}
  .lhead .ln{font-family:var(--font-head);font-weight:700;font-size:14.5px;color:var(--ink)}
  .lhead .ls{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .lhead .lcov{margin-left:auto;text-align:right;flex:none}
  .lhead .lcov .lv{font-family:var(--font-head);font-weight:800;font-size:16px}
  .lhead .lcov .ll{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase}
  .frow{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid var(--line-2);font-size:12.5px}
  .frow:first-of-type{border-top:none}
  .frow .fic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none;background:var(--surface-2);color:var(--soft)}
  .frow .fic .ic{width:15px;height:15px}
  .frow .fn2{font-weight:700;color:var(--ink-2)}
  .frow .fm{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}
  .frow .fsp{flex:1}
  .kcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(272px,1fr));gap:12px;padding:6px 20px 16px}
  .kcard{background:var(--surface-2);border-radius:var(--r-md);padding:13px 15px;display:flex;flex-direction:column;gap:7px;
    border-left:3px solid var(--brand)}
  .kcard.warn{border-left-color:var(--warn);background:var(--warn-bg)}
  .kcard .kk{display:flex;align-items:center;gap:7px}
  .kcard .kn2{font-family:var(--font-head);font-weight:700;font-size:12.5px;color:var(--ink)}
  .kcard .kedit{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--brand);cursor:pointer}
  .kcard .kv2{font-size:12.5px;color:var(--soft);line-height:1.55}
  .kcard .kv2 b{color:var(--ink-2)}
  .kcard .kfoot{display:flex;align-items:center;gap:8px;padding-top:7px;border-top:1px solid var(--line);flex-wrap:wrap}
  .kcite{font-size:10.5px;color:var(--muted);font-weight:600;display:inline-flex;align-items:center;gap:4px;cursor:help}
  .kcite .ic{width:11px;height:11px;color:var(--brand)}
  .kconf{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:6px;margin-left:auto;white-space:nowrap}
  .kconf.hi{background:var(--good-bg);color:var(--good)}
  .kconf.mid{background:var(--warn-bg);color:#B9820B}
  .kconf.lo{background:var(--bad-bg);color:var(--bad)}
  .kb-cite{display:flex;gap:7px;align-items:flex-start;font-size:11.5px;color:var(--muted);font-weight:600;
    margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);line-height:1.5}
  .kb-cite .ic{width:12px;height:12px;color:var(--brand);margin-top:2px;flex:none}
  .kb-cite b{color:var(--soft)}

  /* ---------- 规模态（组合决策）---------- */
  /* ---------- 角色体系 ---------- */
  .role-switch{display:flex;gap:4px;background:var(--surface-2);border-radius:11px;padding:3px}
  .rs-btn{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:9px;font-size:12px;font-weight:700;
    color:var(--soft);transition:background .15s,color .15s;white-space:nowrap}
  .rs-btn i{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:11px;
    font-weight:800;font-family:var(--font-head);font-style:normal;flex:none}
  .rs-btn.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
  .rs-btn:hover{color:var(--ink-2)}
  .rs-btn small{font-size:10px;color:var(--muted);font-weight:600}

  /* ---- P1-F3 合同 / 支付（partner 形态）---- */
  /* GAP-003 修复：放款条件由【交付环节的真实状态】驱动，不是硬编码 ready:true。
     原实现：gsea 停在 04（05 交付尚未开始），结算面板却已允许财务放款
     —— 不可逆资金动作建立在互相矛盾的阶段状态上。 */
  function payoutReady(cid,kol){
    const c=getCamp(cid), DL=D(cid,"deliv");
    if(!c||c.stage<5) return {ok:false,why:`项目尚未进入 ${STAGES[4].n} ${STAGES[4].nm} —— 内容还没交付，不存在「审核通过」`};
    if(!DL) return {ok:false,why:"本项目没有交付记录"};
    const row=DL.rows.find(r=>r.kol===kol);
    if(!row) return {ok:false,why:`${kol} 没有交付物`};
    if(!row.published) return {ok:false,why:`${kol} 的终稿尚未标记可发布（待${gateOwner("mark-pub").label}审核）`};
    const ad=DL.checks.find(x=>x[0]==="披露要求 #ad");
    if(ad&&!ad[1]) return {ok:false,why:"披露要求 #ad 未通过 —— 合规未过不放款"};
    return {ok:true,why:"内容审核已通过 · 披露合规已过"};
  }

  function stepsBar(c,vs){
    return `<div class="steps">${STAGES.map((s,i)=>{
      const n=i+1, cls=n<c.stage?"done":(n===c.stage?"cur":"");

        <div class="snm">${s.nm}</div></div>`;}).join("")}</div>`;
  }
  /* 空态：该项目在此环节无数据 —— 诚实地说没有，而不是借别人的数据。
     区分「未抵达」与「已走过但本原型未建模」，不能对已过的环节说「尚未进入」 */

      <div class="fields">

      <div class="fields">

      <div class="pf-slots">${PORTFOLIO.slots.map(s=>`<div class="slot"><div class="sv tnum">${s.v}</div><div class="sl">${s.l}</div><div class="sd">${s.d}</div></div>`).join("")}</div>

      <div class="bench">替补池已保留：${PORTFOLIO.bench.map(b=>`<span class="tag">${b}</span>`).join("")}<span style="color:var(--muted)">· 可调整权重、替换候选，判断理由会记录进关系资产</span></div>
      ${readyBlock("组合建议可评审","团队可以调整权重、替换候选并记录判断理由。",[["候选优先级已整理",1],["组合缺口已提示",1],["替补对象已保留",1]],!isPast)}
      <div class="draft-foot"><button class="btn line sm" data-goto="match" data-scope="${c.id}" data-from="${c.id}:3">在 Match 工作台做组合决策 →</button><div class="spacer"></div>${adv("进入沟通协作 →")}</div></div>`;

      <div class="draft-h">${IC.mail}<h4>沟通协作 · 邀约与回复工作区</h4><span class="pill ${isPast?'good':(isCur?'brand':'ghost')}">${isPast?'已完成':(isCur?'当前环节':'未开始')}</span>${ownerTag}</div>
      <div class="fields">

        <div class="field"><div class="k">人工确认</div><div class="v">报价、合同与正式承诺由团队确认</div></div></div>
      <div style="padding:14px 20px 4px;display:flex;gap:14px;flex-wrap:wrap">
        <span class="pill good">3 已发送</span><span class="pill brand">3 已回复</span><span class="pill warn">1 待条款确认</span><span class="pill ghost">负责人：你 ×2 · Sarah ×1</span></div>
      ${readyBlock("协作路径已建立","项目成员可以看到每位创作者的当前状态与负责人。",[["回复重点已归纳",1],["负责人已标记",1],["下一动作清晰可见",1]],!isPast)}
      <div class="draft-foot"><button class="btn line sm" data-goto="reach" data-scope="${c.id}" data-from="${c.id}:4">去回复工作区处理 →</button><div class="spacer"></div>${adv("查看内容交付 →")}</div></div>

    if(n===5){

          <div class="di">${r.item}<div class="dv">${r.ver} · 每轮修改保留负责人与时间</div></div>

      ${readyBlock("交付节点可跟踪","团队能清楚看到待审核内容、修改意见与发布日期。",[["版本历史已保留",1],["风险项已标记",1],["发布时间可协调",1],["披露要求 #ad",adOk]],!isPast)}
      <div class="draft-foot"><button class="btn line sm" data-goto="delivery" data-scope="${c.id}" data-from="${c.id}:5">在交付工作台打开 →</button><div class="spacer"></div>${adv("进入效果复盘 →")}</div></div>`;
    }
    const RETRO=S.retro;
    return note+`<div class="draft anim-in">
      <div class="draft-h">${IC.chart}<h4>效果复盘 · 结论与关系资产</h4><span class="pill ${RETRO.confirmed?'good':(isCur?'brand':'ghost')}">${RETRO.confirmed?'已确认':(isCur?'当前环节':'未开始')}</span>${ownerTag}</div>
      <div class="fields">
        <div class="field"><div class="k">复盘范围</div><div class="v">内容表现 · 市场反馈 · 项目节奏 · 团队协作记录</div></div>

        <div class="field"><div class="k">下一轮建议（AI 草案）</div><div class="v">${RETRO.next}</div></div>
        <div class="field full"><div class="k">证据缺口 · 保留待验证</div><div class="v">${RETRO.gap}</div></div></div>
      ${readyBlock(RETRO.confirmed?"复盘已确认 · 资产已写入":"复盘等待团队确认","AI 已形成草案，最终结论与关系资产写入由团队确认。",[["结果与动作已连接",1],["合作经验已归档",1],["下一轮建议已形成",1]],!RETRO.confirmed)}

        ${RETRO.confirmed?`<span class="pill good">${IC.check} 已采纳 · 资产已写入</span>`
          :(isCur?(ownsStage(6)?`<button class="btn primary" data-retro="${c.id}">采纳结论并写入关系资产</button>`
                   :`<span class="await">${IC.shield}待${stageOwner(6).label}采纳</span>`):"")}</div></div>`;

    const c=getCamp(currentCampaignId); if(!c||c.stage>=6) return;

  /* ================= Match（组合 + 候选流） ================= */
  function kolCard(k){

  function doUpload(){

  function areaChart(data){
    const w=320,h=110,max=Math.max(...data),min=Math.min(...data),dx=w/(data.length-1);
    const pts=data.map((v,i)=>[i*dx,h-10-((v-min)/((max-min)||1))*(h-26)]);
    const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
    const last=pts[pts.length-1];
    return `<svg class="trend" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7551FF" stop-opacity=".26"/><stop offset="1" stop-color="#7551FF" stop-opacity="0"/></linearGradient></defs>
      <path d="${line} L ${w} ${h} L 0 ${h} Z" fill="url(#ag)"/>
      <path d="${line}" fill="none" stroke="#422AFB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
      <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="4" fill="#422AFB"/></svg>`;
  }

  /* GAP-007/013：逐封发送 + 部分成功 + 退信 —— 不是全局布尔 */

  /* GAP-004②：报价阈值必须执行 —— 原实现 THRESHOLD.quote 定义了从未使用，
     $2,400 报价可经条款弹窗直接发出，绕过 $2,000 门 */
  /* 报价金额解析：支持 $2,400 / $2.4k / $1.5k–2.2k（区间取上界，按最坏情况判门） */
  const quoteAmount=r=>{
    const d=(r.gate&&r.gate.desc)||"";
    const nums=[...d.matchAll(/\$?\s*([\d,]+(?:\.\d+)?)\s*(k)?/gi)]
      .map(m=>{const v=parseFloat(m[1].replace(/,/g,"")); return m[2]?v*1000:v;})
      .filter(v=>v>=100);            /* 滤掉「长视频 1 支」这类小数字 */
    return nums.length?Math.max(...nums):0;
  };
  function gateTerms(i,cid){

        r.gate.desc.replace(/<[^>]+>/g,""),`$${amt.toLocaleString()}`,
        {kind:"quote",id:r.kol},()=>{r.done=true;});
      renderReach();
      agentReply(`<b>$${amt.toLocaleString()} 超过报价阈值 $${THRESHOLD.quote.toLocaleString()}</b> —— 已提交 <b>${gateOwner("approve-quote").label} ${gateOwner("approve-quote").name}</b> 审批（单号 ${a.id}）。<br>
        <b>批准前不会向 ${r.kol} 发出任何报价承诺</b> —— 报价是对外承诺，我不会替你拍。`,

  /* 越阶段门：真正的高风险动作 —— 必须捕获理由 */
  /* ===================================================================
     GAP-002 修复：六环节每个阶段门都有 exitCriteria（退出条件）。
     原实现只守 Brief，其余可直接 c.stage++ → 六环节退化成可点击进度条。
     每条 = {ok, why, hard} —— hard 表示不可越门（合规/资金类）
     =================================================================== */
  function exitCriteria(cid,n){
    const c=getCamp(cid), S=D(cid)||{};
    switch(n){
      case 1: return KB.coverage>=80
        ? [{ok:true,why:`知识覆盖度 ${KB.coverage}% ≥ 80%`}]
        : [{ok:false,hard:false,why:`知识覆盖度 ${KB.coverage}% < 80% —— 缺 Q3 东南亚用研报告，目标受众置信度仅 52，匹配精度上限被压在 ${KB.matchCeil}%`}];
      case 2: return [S.pool&&S.pool.length
        ? {ok:true,why:`候选池已生成（${S.pool.length} 位）`}
        : {ok:false,hard:true,why:"候选池尚未生成 —— 没有候选就没有可匹配的对象"}];
      case 3: {  /* 组合必须【已批准】才能进入沟通 —— 与 GAP-004 同源 */
        const eff=effectivePlan(cid);
        if(eff) return [{ok:true,why:"组合方案已批准并生效"}];
        const pend=APPROVALS.find(a=>a.status==="pending"&&a.target&&a.target.kind==="plan"&&a.cid===cid);
        return [{ok:false,hard:true,why:pend
          ? `组合方案待 ${roleById(pend.to).label} 审批（单号 ${pend.id}）—— 未批准不得开始触达`
          : "尚未选定组合方案 —— 不知道要联系谁"}];
      }
      case 4: {  /* 有待处理条款不得进入交付 */
        const open=(S.replies||[]).filter(r=>r.gate&&!r.done);
        return [open.length
          ? {ok:false,hard:true,why:`还有 ${open.length} 条待确认条款（${open.map(r=>r.kol).join("、")}）—— 报价没谈定不能进交付`}
          : {ok:true,why:"条款均已确认"}];
      }
      case 5: {  /* 披露合规未过不得完成交付 —— 硬阻断 */
        const DL=S.deliv, out=[];
        if(!DL) return [{ok:false,hard:true,why:"没有交付物"}];
        const ad=DL.checks.find(x=>x[0]==="披露要求 #ad");
        out.push(ad&&ad[1] ? {ok:true,why:"披露要求 #ad 已通过"}
          : {ok:false,hard:true,why:"披露要求 #ad 未通过 —— <b>合规硬门，不可越过</b>"});
        const unpub=DL.rows.filter(r=>r.publishable&&!r.published);
        if(unpub.length) out.push({ok:false,hard:false,why:`${unpub.length} 条终稿尚未标记可发布`});
        return out;
      }
      default: return [{ok:true,why:"—"}];
    }
  }
  function gateAdvance(cid){
    const c=getCamp(cid); if(!c||c.stage>=6) return;
    const crit=exitCriteria(cid,c.stage), bad=crit.filter(x=>!x.ok);
    if(!bad.length){advanceStage();return;}
    const hard=bad.some(x=>x.hard);
    if(hard){
      toast("阶段门未通过 · 不可越过");
      agentReply(`<b>不能推进到 ${STAGES[c.stage].n} ${stageName(c.stage+1)}</b> —— ${STAGES[c.stage-1].nm} 的退出条件未满足：<br>
        ${bad.map(x=>`· ${x.why}`).join("<br>")}<br>
        <b>这是硬门，我不提供越门选项</b> —— 越过去后面全是错的。`,
        "exitCriteria 未过 · 硬阻断",null,null);
      return;}
    openGate("越过阶段门",`「${stageName(c.stage)}」的退出条件未满足：<br>
      ${bad.map(x=>`· ${x.why}`).join("<br>")}<br><br>
      <b>强行推进会影响后续所有环节，且理由会被记录（发起人 / 时间 / 理由）。</b>`,
      "记录理由并强行推进",()=>{advanceStage(true);});}

    if(lb){const k=lb.dataset.lib; if(k===libKey)return; libKey=k; setActive("match"); renderMatch();
      const L=LIBS[k], p=PLANS.find(x=>x.id===selectedPlan);
      agentReply(`库规模切到 <b>${L.label}</b>：语义相关 <b>${L.relevant}</b> 位、自动排除 <b>${L.excluded}</b> 位、优选池 <b>${L.pool}</b> 位。<br><b>交互没变，决策次数还是 ${p?1+p.review:1} 次</b> —— 这就是决策单元升到「组合」的意义：<b>人的决策量不随库规模增长</b>。${k==="now"?"注意方案质量：当前库覆盖不到越南、平均可信度只有 79。":"库变大 ≠ 选更多人（人数由预算决定），而是<b>同样人数、质量更高</b>。"}`,
        "库规模 → "+L.label+" · 决策次数不变",null,"match");
      return;}
    const pl=e.target.closest("[data-plan]");
    if(pl){const id=pl.dataset.plan, p=(D(scopeId,"plans")||[]).find(x=>x.id===id);
      if(!p||selectedPlan===id)return;
      /* 守卫：既无决策权也无提交权 → 只读 */
      if(!ownsGate("plan")&&!ownsGate("submit-plan")){
        toast(`组合决策属${gateOwner("plan").label}`);
        agentReply(`组合决策不在<b>${role().label}</b>的权限内 —— 这是<b>${gateOwner("plan").label}</b>的闸门。<br>你可以看，但我不会替你选。`,
          "权限守卫 · 闸门归属",null,null);
        return;}
      const q=effQ(p), budget=+p.budget.replace(/[$,]/g,"");
      /* 闸门归属 + 阈值：BD 选方案 = 提交审批；营销负责人才能直接拍板 */
      if(!ownsGate("plan")&&budget>THRESHOLD.planBudget){
        const cid=scopeId;
        /* GAP-004：绑定业务对象 + 待执行 action；【不】立即设 selectedPlan */
        const a=submitApproval("submit-plan",cid,`组合方案：${p.nm}`,
          `${p.n} 位创作者 · 预估触达 ${q.reach} · 市场覆盖 ${q.mk} · 受众重叠 ${q.ov}% · 平均可信度 ${q.cred}`,
          p.budget,{kind:"plan",id},()=>{selectedPlan=id;});
        pendingPlan=id; renderMatch();
        agentReply(`已选 <b>${p.nm}</b>（${p.n} 位 · ${p.budget}）。<br>
          <b>${p.budget} 超过你的审批额度（$${THRESHOLD.planBudget.toLocaleString()}）</b> —— 已提交给 <b>${gateOwner("approve-plan").label} ${gateOwner("approve-plan").name}</b> 审批，单号 ${a.id}。<br>
          <b>组合在批准前不生效</b> —— 我没有替你批，Reach 也不会据此起草邮件。`,
          "submit-plan · 已交接 · 业务对象待批不生效",()=>setChips("afterMatch"),"match");
        return;}
      selectedPlan=id; renderMatch();
      agentReply(`已选 <b>${p.nm}</b>（${p.n} 位 · ${p.budget} · 预估触达 ${q.reach}）。${ovTone(q.ov)!=="good"||mkTone(q.mk)!=="good"?`⚠️ 受众重叠 <b>${q.ov}%</b>（相当一部分触达是重复付费）、市场覆盖 <b>${q.mk}</b> —— 确定要这个方案吗？`:`市场覆盖 ${q.mk}、受众重叠仅 ${q.ov}%、平均可信度 ${q.cred}，组合成立。`}<br>其中 <b>${p.auto} 位</b>高置信已自动纳入（可抽样审计），<b>${p.review} 位</b>处于模糊地带需你判断。`,
        "select_portfolio · 1 次决策覆盖 "+p.n+" 位",null,"match");
      return;}
    if(e.target.closest("[data-audit]")){auditOpen=!auditOpen;renderMatch();return;}
    /* IA 方案 C：跳到环节页时携带项目作用域 + 返回锚点 */
    const go=e.target.closest("[data-goto]");
    if(go){if(go.dataset.scope)scopeId=go.dataset.scope;
      backTo=go.dataset.from||null;
      renderModule(go.dataset.goto);return;}
    const bk=e.target.closest("[data-backto]");
    if(bk){const [cid,st]=bk.dataset.backto.split(":");backTo=null;
      setActive("campaigns");renderCampaignDetail(cid,+st);return;}
    const sp=e.target.closest("[data-setscope]");
    if(sp){scopeId=sp.dataset.setscope;backTo=null;renderModule(activeModule);return;}
    const camp=e.target.closest("[data-camp]");
    if(camp){const id=camp.dataset.camp, jump=camp.dataset.stageJump;
      setActive("campaigns"); renderCampaignDetail(id, jump?+jump:undefined); return;}
    const st=e.target.closest("[data-stage]"); if(st&&currentCampaignId){renderCampaignDetail(currentCampaignId,+st.dataset.stage);return;}
    if(e.target.closest("[data-back]")){renderCampaigns();return;}
    const pf=e.target.closest("[data-profile]"); if(pf){renderKolProfile(+pf.dataset.profile);return;}
    const ac=e.target.closest("[data-accept]"); if(ac){const id=+ac.dataset.accept;accepted.add(id);skipped.delete(id);refreshKols();return;}
    const sk=e.target.closest("[data-skip]"); if(sk){const id=+sk.dataset.skip;skipped.add(id);accepted.delete(id);refreshKols();return;}
    if(e.target.closest("[data-confirm-camp]")){CAMPAIGN._confirmed=true;setActive("campaigns");renderCampaigns();toast("项目已建立 · 进入全球发现");
      agentReply(`项目 <b>${CAMPAIGN.name}</b> 已建立并进入 <b>02 全球发现</b>。候选池我来准备，确认范围的决定权在你。`,"阶段门通过 · draft → live",()=>setChips("afterBrief"),"scout");return;}
    if(e.target.closest("[data-advance]")){gateAdvance(currentCampaignId);return;}
    /* 可撤销动作：立即执行 + undo（不弹窗）*/
    /* 交接链：批准 / 退回并注明原因 / 修改后重提 */
    const ap=e.target.closest("[data-approve]"); if(ap){approveIt(ap.dataset.approve);return;}
    const rt2=e.target.closest("[data-return]");
    if(rt2){const a=APPROVALS.find(x=>x.id===rt2.dataset.return);
      /* GAP-004④：退回原因必须由决策人填写，不能硬编码 */
      openGate("退回并注明原因",`将把 <b>${a.title}</b> 退回给 <b>${roleById(a.from).label} ${roleById(a.from).name}</b>。<br>
        <b>退回不是拒绝</b> —— 原因会随退回单进入对方待办，对方改完可重新提交。
        <div class="reason-box">
          <label>退回原因（必填，会展示给发起人）</label>
          <textarea id="return-reason" rows="3" placeholder="例如：预算超出本季度额度，请压到 $8,000 内或补充追投理由"></textarea>
          <div class="reason-quick">
            ${["预算超出本季度额度，请压到 $8,000 内或补充追投理由","组合缺市场覆盖（越南空缺），请补齐或说明取舍",
               "请先补齐知识库用研报告再提交","报价高于市场行情，请重新谈判或启用替补池"]
              .map(r=>`<button class="chip" data-reason="${r}">${r.slice(0,12)}…</button>`).join("")}
          </div></div>`,
        "确认退回",()=>{
          const v=($("#return-reason")&&$("#return-reason").value||"").trim();
          if(!v){toast("请填写退回原因");return;}
          returnIt(a.id,v);});
      return;}
    const rs=e.target.closest("[data-resubmit]"); if(rs){resubmit(rs.dataset.resubmit);return;}
    const s1=e.target.closest("[data-send-one]");
    if(s1){const [cid,i]=s1.dataset.sendOne.split("|");doSendOne(cid,+i);return;}
    const rty=e.target.closest("[data-retry]");
    if(rty){const [cid,i]=rty.dataset.retry.split("|");doRetry(cid,+i);return;}
    const blk=e.target.closest("[data-bulk]"); if(blk){doBulk(blk.dataset.bulk);return;}
    /* GAP-009：导出=内部动作直接做；对外分享=人类闸门 + 可撤销 */
    if(e.target.closest("[data-export-report]")){
      REPORT.exported=true; renderInsight();
      undoToast("周报已导出 PDF（内部动作）",()=>{REPORT.exported=false;renderInsight();});
      return;}
    if(e.target.closest("[data-share-report]")){gateShare();return;}
    if(e.target.closest("[data-revoke-share]")){revokeShare();return;}
    if(e.target.closest("[data-upload]")){doUpload();return;}
    /* P1-7：AI 起草→人审阅，审阅必须能导向修改（原来 15 个「改/修正」连 handler 都没有）*/
    const kf=e.target.closest("[data-kfix]");
    if(kf){const [lid,key]=kf.dataset.kfix.split("|");
      agentReply(`要改<b>${key}</b>？直接告诉我怎么改，例如「${key==="目标受众"?"受众改成 18-24 女性为主":(key==="预算"?"预算改成 1.5 万":"这条抽错了，应该是…")}」——我会更新知识卡片并<b>标注为「人工修正」</b>（覆盖 AI 抽取值，来源记为你，置信度 100）。<br><b>你的修正会同时影响后续所有匹配。</b>`,
        "知识卡片可修正 · 人工值优先于 AI 抽取值",null,"match");return;}
    const ed=e.target.closest(".edit");
    if(ed){agentReply(`要改这个字段？直接对我说 —— 例如「预算改成 1.5 万」「市场加上越南」。我改完你再确认。`,null,null,"match");return;}
    const ov=e.target.closest("[data-overrule]"); if(ov){doOverrule(+ov.dataset.overrule);return;}
    if(e.target.closest("[data-sample]")){
      const S=D(scopeId)||{}, p=(S.plans||[]).find(x=>x.id===selectedPlan);
      const sample=(S.pool||[]).filter(k=>EVAL[k.id]&&EVAL[k.id].cred>=80).slice(0,3);
      agentReply(`抽样审计 <b>3 位</b>自动纳入的候选（从 ${p?p.auto:0} 位中随机）：<br>
        ${sample.map(k=>`· <b>${k.nm}</b> 可信 ${EVAL[k.id].cred} —— ${EVAL[k.id].sig[0][1]}；${EVAL[k.id].sig[1][1]}`).join("<br>")}<br>
        <b>三位信号均正常，自动纳入成立。</b>不认可可以点头像看完整依据、或直接剔除。`,
        "sample_audit · 规模下建立信任的方式：抽检而非全检",null,"match");return;}
    const mp=e.target.closest("[data-mark-pub]"); if(mp){doMarkPub(mp.dataset.markPub);return;}
    const rt=e.target.closest("[data-retro]"); if(rt){doRetro(rt.dataset.retro);return;}
    const rc=e.target.closest("[data-reclaim]"); if(rc){doReclaim(rc.dataset.reclaim);return;}
    /* 真闸门：对外 / 不可逆 / 花钱 */
    const g=e.target.closest("[data-gate]");
    if(g){const t=g.dataset.gate;
      if(t==="terms")gateTerms(+g.dataset.ri,g.dataset.cid);
      else if(t==="asset")doAsset(+g.dataset.kid);
      else if(t==="payout")gatePayout(g.dataset.cid,g.dataset.kol,g.dataset.amt);
      else if(t==="keys")gateKeys(g.dataset.cid);
      return;}
    if(e.target.closest("[data-noop]")){toast("原型中此操作为示意");return;}
  });
  function refreshKols(){
    if(activeModule==="match")renderMatch();
    else if(activeModule==="campaigns"&&currentCampaignId)renderCampaignDetail(currentCampaignId,viewStage);}

  /* ---------- 角色渲染 ---------- */
  const RTONE={violet:"#7551FF",blue:"#3965FF",gold:"#FFB547"};
  function renderRoleSwitch(){
    $("#role-switch").innerHTML=ROLES.map(r=>{
      const n=APPROVALS.filter(a=>(a.status==="pending"&&a.to===r.id)||(a.status==="returned"&&a.from===r.id)).length;
      return `<button class="rs-btn ${roleId===r.id?'on':''}" data-role="${r.id}" title="${r.scope}">
        <i style="background:${RTONE[r.tone]}">${r.avatar}</i>
        <span>${r.label}${n?` <span class="pill bad" style="padding:1px 6px;font-size:9px">${n}</span>`:""}</span></button>`;}).join("");
  }
  function renderRoleChrome(){
    const r=role();
    $("#copilot-agent").textContent=r.agent.nm;
    $("#copilot-role").innerHTML=`<span style="color:var(--good)">●</span> 为 ${r.label} · ${r.name} 服务`;
    $("#copilot-scope").innerHTML=`${IC.shield}<div><b>数据边界：</b>${r.copilotScope}<br><b>护栏：</b>${r.agent.guard}</div>`;
    /* 导航按 access 过滤 —— 旧系统本来就有（admin 页不在 marketer 侧栏），重构时丢了 */
    document.querySelectorAll(".nav-item").forEach(n=>{
      n.style.display=r.access.includes(n.dataset.nav)?"":"none";});
  }
  function switchRole(id){
    if(id===roleId) return;
    roleId=id; const r=role();
    if(!canAccess(activeModule)) activeModule="dashboard";
    selectedPlan=selectedPlan; auditOpen=false;
    renderRoleSwitch(); renderRoleChrome();
    /* 学有墨：换岗位 = 换数据权限，旧对话可能越权 → 清空重开 */
    msgs.innerHTML="";
    renderModule(activeModule);
    addAgent(`你好 ${r.name}，我是<b>${r.agent.nm}</b>。<br><b>我的数据边界：</b>${r.copilotScope}<br><b>我不会做的事：</b>${r.agent.guard}<br>你的待办按「${r.taskDesc}」。`);
    setChips("default");
  }

  document.querySelectorAll(".nav-item").forEach(n=>n.onclick=()=>{
    if(!canAccess(n.dataset.nav)){toast(`${role().label}无权访问该模块`);return;}
    renderModule(n.dataset.nav);});
  $("#role-switch").addEventListener("click",e=>{
    const b=e.target.closest("[data-role]"); if(b) switchRole(b.dataset.role);});

  const input=$("#input");
  function autosize(){input.style.height="auto";input.style.height=Math.min(input.scrollHeight,120)+"px";}
  input.addEventListener("input",autosize);
  input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submit(input.value);}});
  $("#send").onclick=()=>submit(input.value);

  const root=document.documentElement;
  $("#theme-btn").onclick=()=>{const cur=root.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
    root.setAttribute("data-theme",cur==="dark"?"light":"dark");};

  let tt;function toast(msg){$("#toast-t").innerHTML=msg;$("#toast-undo").style.display="none";
    const t=$("#toast");t.classList.add("on");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("on"),2600);}
  /* 可撤销动作的正确形态：立即执行 + undo，而不是事前弹窗 */
  let undoFn=null;
  function undoToast(msg,fn){$("#toast-t").innerHTML=msg;const u=$("#toast-undo");
    undoFn=fn; u.style.display=fn?"inline-flex":"none";
    const t=$("#toast");t.classList.add("on");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("on"),5200);}
  $("#toast-undo").onclick=()=>{if(undoFn){undoFn();undoFn=null;}$("#toast").classList.remove("on");toast("已撤销");};

  /* ================= boot ================= */
  const roster=$("#roster");
  Object.entries(AGENTS).forEach(([k,a])=>{
    const b=el("button","ra");b.style.background=a.clr;b.textContent=a.av;b.title=a.nm+" · "+a.cat;
    b.onclick=()=>addAgent(`我是<b>${a.nm}</b>（${a.cat}）。把任务交给我时，我提供草案与建议 —— 最终判断始终由你确认。`,null,k);
    roster.appendChild(b);});
  /* 测试钩子：让端到端回归能跑在干净起点（生产版不导出）*/
  if(typeof window!=="undefined") window.__resetForTest=()=>{
    APPROVALS.length=0; apSeq=0; seedApproval();
    selectedPlan=null; pendingPlan=null; accepted.clear(); skipped.clear();
    Object.keys(DRAFTS).forEach(k=>delete DRAFTS[k]);
    Object.keys(CRM).forEach(k=>delete CRM[k]); SUPPRESS.clear();
    REPORT.shown=false; REPORT.shared=false; REPORT.token=null; REPORT.exported=false;
    DONE_TODAY.clear(); OVERRULED.clear(); GATE_LOG.length=0;
    CAMPAIGNS.forEach(c=>{c.stage=({gsea:4,hsr:5,zzz:2,sky:6})[c.id]||c.stage;});
    delete CAMPAIGN._shown; delete CAMPAIGN._confirmed; delete CAMPAIGN._edited;
    CAMPAIGN.rows[1][1]="$12,000";
  };

  seedApproval();
  renderRoleSwitch(); renderRoleChrome();
  addAgent(`你好 ${role().name}，我是<b>${role().agent.nm}</b>。<br><b>我的数据边界：</b>${role().copilotScope}<br><b>我不会做的事：</b>${role().agent.guard}<br>你的待办按「${role().taskDesc}」。<br><br>试试切换右上角的<b>角色</b> —— 导航、待办、闸门归属、我的数据边界都会跟着变。`);
  setChips("default");
  renderModule("dashboard");
})();
</script>
